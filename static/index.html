<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Odoo Purchasing Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #030712; color: #f1f5f9; transition: background .2s, color .2s; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #111827; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    .fade { animation: fadeUp .25s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:none } }
    .sk { background: linear-gradient(90deg,#1f2937 25%,#374151 50%,#1f2937 75%);
          background-size:200% 100%; animation:sk 1.4s infinite; border-radius:6px; }
    @keyframes sk { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Light mode ── */
    html.light body { background:#f1f5f9; color:#0f172a; }
    html.light ::-webkit-scrollbar-track { background:#e2e8f0; }
    html.light ::-webkit-scrollbar-thumb { background:#94a3b8; }
    html.light .sk { background:linear-gradient(90deg,#e2e8f0 25%,#f8fafc 50%,#e2e8f0 75%); background-size:200% 100%; }
    /* backgrounds */
    html.light .bg-gray-950 { background-color:#e2e8f0 !important; }
    html.light .bg-gray-900 { background-color:#ffffff !important; }
    html.light .bg-gray-800 { background-color:#f1f5f9 !important; }
    html.light .bg-gray-700 { background-color:#e2e8f0 !important; }
    html.light .bg-gray-600 { background-color:#cbd5e1 !important; }
    html.light .bg-gray-950\/50 { background-color:rgba(226,232,240,.5) !important; }
    html.light .bg-gray-900\/80 { background-color:rgba(255,255,255,.8) !important; }
    html.light .bg-gray-900\/70 { background-color:rgba(255,255,255,.7) !important; }
    html.light .bg-gray-800\/60 { background-color:rgba(241,245,249,.6) !important; }
    html.light .bg-gray-800\/50 { background-color:rgba(241,245,249,.5) !important; }
    html.light .bg-gray-800\/40 { background-color:rgba(241,245,249,.4) !important; }
    html.light .bg-gray-800\/30 { background-color:rgba(241,245,249,.3) !important; }
    html.light .bg-gray-800\/20 { background-color:rgba(241,245,249,.2) !important; }
    html.light .bg-gray-700\/60 { background-color:rgba(226,232,240,.6) !important; }
    html.light .bg-gray-700\/40 { background-color:rgba(226,232,240,.4) !important; }
    /* text */
    html.light .text-white    { color:#0f172a !important; }
    html.light .text-gray-100 { color:#1e293b !important; }
    html.light .text-gray-200 { color:#1e293b !important; }
    html.light .text-gray-300 { color:#334155 !important; }
    html.light .text-gray-400 { color:#475569 !important; }
    html.light .text-gray-500 { color:#64748b !important; }
    html.light .text-gray-600 { color:#94a3b8 !important; }
    /* borders */
    html.light .border-gray-800    { border-color:#e2e8f0 !important; }
    html.light .border-gray-800\/40{ border-color:rgba(226,232,240,.4) !important; }
    html.light .border-gray-800\/20{ border-color:rgba(226,232,240,.2) !important; }
    html.light .border-gray-700    { border-color:#cbd5e1 !important; }
    html.light .border-gray-700\/80{ border-color:rgba(203,213,225,.8) !important; }
    html.light .border-gray-700\/60{ border-color:rgba(203,213,225,.6) !important; }
    html.light .border-gray-700\/50{ border-color:rgba(203,213,225,.5) !important; }
    html.light .border-gray-600    { border-color:#94a3b8 !important; }
    /* dividers */
    html.light .divide-gray-800 > * + * { border-color:#e2e8f0 !important; }
    html.light .divide-gray-800\/60 > * + * { border-color:rgba(226,232,240,.6) !important; }
    html.light .divide-gray-800\/50 > * + * { border-color:rgba(226,232,240,.5) !important; }
    html.light .divide-gray-700\/50 > * + * { border-color:rgba(203,213,225,.5) !important; }
    /* hover */
    html.light .hover\:bg-gray-800:hover { background-color:#f1f5f9 !important; }
    html.light .hover\:bg-gray-700:hover { background-color:#e2e8f0 !important; }
    html.light .hover\:bg-gray-800\/40:hover { background-color:rgba(241,245,249,.4) !important; }
    /* KPI gradient cards in light mode */
    html.light .from-indigo-900\/50  { --tw-gradient-from:rgba(238,242,255,.6); }
    html.light .to-indigo-800\/20    { --tw-gradient-to:rgba(224,231,255,.3); }
    html.light .border-indigo-700\/30{ border-color:rgba(165,180,252,.4) !important; }
    html.light .from-cyan-900\/50    { --tw-gradient-from:rgba(236,254,255,.6); }
    html.light .to-cyan-800\/20      { --tw-gradient-to:rgba(207,250,254,.3); }
    html.light .border-cyan-700\/30  { border-color:rgba(103,232,249,.4) !important; }
    html.light .from-emerald-900\/50 { --tw-gradient-from:rgba(236,253,245,.6); }
    html.light .to-emerald-800\/20   { --tw-gradient-to:rgba(209,250,229,.3); }
    html.light .border-emerald-700\/30{ border-color:rgba(52,211,153,.4) !important; }
    html.light .from-amber-900\/50   { --tw-gradient-from:rgba(255,251,235,.6); }
    html.light .to-amber-800\/20     { --tw-gradient-to:rgba(254,243,199,.3); }
    html.light .border-amber-700\/30 { border-color:rgba(251,191,36,.4) !important; }
    html.light .from-rose-900\/50    { --tw-gradient-from:rgba(255,241,242,.6); }
    html.light .to-rose-800\/20      { --tw-gradient-to:rgba(255,228,230,.3); }
    html.light .border-rose-700\/30  { border-color:rgba(251,113,133,.4) !important; }
    html.light .from-violet-900\/50  { --tw-gradient-from:rgba(245,243,255,.6); }
    html.light .to-violet-800\/20    { --tw-gradient-to:rgba(237,233,254,.3); }
    html.light .border-violet-700\/30{ border-color:rgba(167,139,250,.4) !important; }
    /* inputs & selects */
    html.light input, html.light select, html.light textarea {
      background-color:#ffffff !important; color:#0f172a !important;
      border-color:#cbd5e1 !important;
    }
    html.light input::placeholder { color:#94a3b8 !important; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ── utils ── */
const money = (n) => new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n||0);
const num   = (n,d=0) => new Intl.NumberFormat('es-ES',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n||0);

const STATE = {
  draft:    { label:'Borrador',   cls:'bg-gray-600 text-gray-100' },
  sent:     { label:'Enviada',    cls:'bg-blue-600 text-blue-100' },
  purchase: { label:'Confirmada', cls:'bg-emerald-600 text-emerald-100' },
  done:     { label:'Hecho',      cls:'bg-teal-700 text-teal-100' },
  cancel:   { label:'Cancelada',  cls:'bg-red-700 text-red-100' },
};
const SEV = {
  critical: { icon:'🔴', label:'Sin stock',        bar:'bg-red-500',    txt:'text-red-400'     },
  warning:  { icon:'🟠', label:'Bajo mínimo',      bar:'bg-orange-500', txt:'text-orange-400'  },
  info:     { icon:'🟡', label:'Cerca del mínimo', bar:'bg-yellow-400', txt:'text-yellow-400'  },
  ok:       { icon:'🟢', label:'OK',               bar:'bg-emerald-500',txt:'text-emerald-400' },
};
const TREND = {
  up:     { icon:'📈', label:'Creciente',  cls:'text-emerald-400' },
  down:   { icon:'📉', label:'Decreciente',cls:'text-red-400'     },
  stable: { icon:'➡️', label:'Estable',   cls:'text-blue-400'    },
};
const COLORS = ['#6366f1','#22d3ee','#a3e635','#f97316','#ec4899','#facc15','#34d399','#818cf8','#fb7185','#38bdf8'];

/* ── Theme ── */
const ThemeCtx = React.createContext(true); // true = dark (default)
const useTheme = () => React.useContext(ThemeCtx);

/* ── Read-only mode ── */
const ReadOnlyCtx = React.createContext(false);
const useReadOnly = () => React.useContext(ReadOnlyCtx);
const IS_READONLY = window.location.pathname.startsWith('/view/');

/* ── API hook ── */
function useApi(url) {
  const [data,   setData]    = useState(null);
  const [loading,setLoading] = useState(false);
  const [error,  setError]   = useState(null);
  const load = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const r = await fetch(url);
      const j = await r.json();
      if (!r.ok) throw new Error(j.detail || r.statusText);
      setData(j);
    } catch(e) { setError(e.message); }
    finally    { setLoading(false); }
  }, [url]);
  useEffect(() => { load(); }, [load]);
  return { data, loading, error, refresh: load };
}

/* ── Chart.js wrapper ── */
function CJChart({ type, data, options, height=220 }) {
  const ref  = useRef(null);
  const inst = useRef(null);
  useEffect(() => {
    if (!ref.current || !data) return;
    if (inst.current) inst.current.destroy();
    inst.current = new Chart(ref.current, { type, data, options });
    return () => inst.current && inst.current.destroy();
  }, [type, data, options]);
  return <canvas ref={ref} height={height} />;
}

const baseOpts = (dark=true) => ({
  responsive: true, maintainAspectRatio: false,
  plugins: { legend: { labels: { color: dark ? '#9ca3af' : '#64748b', boxWidth:12, font:{size:11} } } },
});
const gridColor = (dark=true) => dark ? '#1f2937' : '#e2e8f0';
const tickColor  = (dark=true) => dark ? '#6b7280' : '#64748b';
const scaleOpts = (dark=true, axis='y', isMoney=false) => ({
  grid:{ color: axis==='x' ? 'transparent' : gridColor(dark) },
  ticks:{ color:tickColor(dark), font:{size:10},
    callback: isMoney ? (v) => `€${(v/1000).toFixed(0)}k` : undefined }
});

/* ── Skeleton ── */
const Sk = ({h='h-8',w='w-full',cls=''}) =>
  <div className={`sk ${h} ${w} ${cls}`} />;

/* ── KPI card ── */
const KPI = ({label, value, color='indigo', loading}) => {
  const bgs = {
    indigo:'from-indigo-900/50 to-indigo-800/20 border-indigo-700/30',
    cyan:  'from-cyan-900/50 to-cyan-800/20 border-cyan-700/30',
    emerald:'from-emerald-900/50 to-emerald-800/20 border-emerald-700/30',
    amber: 'from-amber-900/50 to-amber-800/20 border-amber-700/30',
    rose:  'from-rose-900/50 to-rose-800/20 border-rose-700/30',
    violet:'from-violet-900/50 to-violet-800/20 border-violet-700/30',
  };
  return (
    <div className={`rounded-xl border bg-gradient-to-br p-4 ${bgs[color]}`}>
      <p className="text-xs text-gray-400 uppercase tracking-wide mb-1">{label}</p>
      {loading ? <Sk h="h-7" w="w-3/4" /> : <p className="text-2xl font-bold text-white">{value}</p>}
    </div>
  );
};

/* ── Error banner ── */
const Err = ({msg, onRetry}) => (
  <div className="flex flex-col items-center justify-center gap-3 py-20 fade">
    <span className="text-4xl">⚠️</span>
    <p className="text-red-400 text-sm text-center max-w-md">{msg}</p>
    {onRetry && <button onClick={onRetry} className="px-4 py-1.5 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm">Reintentar</button>}
  </div>
);

/* ══════════════════════════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════════════════════════ */
function Dashboard() {
  const { data, loading, error, refresh } = useApi('/api/dashboard');
  const { data: forecastData } = useApi('/api/forecast');
  const { data: transitData }  = useApi('/api/transit');
  const dark = useTheme();

  const transitStats = useMemo(() => {
    const orders = (transitData?.orders || []).filter(o => (o.status || 'active') === 'active');
    const totalOrders = orders.length;
    const totalContainers = orders.reduce((a, o) => a + (o.odoo_po ? o.odoo_po.split(',').filter(Boolean).length : 0), 0);
    const today = new Date().toISOString().slice(0, 10);
    const arrivingSoon = orders.filter(o => o.expected_arrival && o.expected_arrival <= new Date(Date.now() + 30*24*3600*1000).toISOString().slice(0,10) && o.expected_arrival >= today).length;
    return { totalOrders, totalContainers, arrivingSoon };
  }, [transitData]);

  const criticalProducts = useMemo(() => {
    if (!forecastData?.products) return [];
    return forecastData.products
      .filter(p => p.coverage_months < 2 && p.coverage_months > -99)
      .filter(p => !p.product_name.toUpperCase().includes('PACK'))
      .filter(p => !p.is_kit)
      .sort((a, b) => a.coverage_months - b.coverage_months)
      .slice(0, 8);
  }, [forecastData]);

  const trendChartData = useMemo(() => {
    if (!data?.trend) return null;
    return {
      labels: data.trend.map(d => d.month),
      datasets: [{
        label: 'Gasto',
        data: data.trend.map(d => d.amount),
        borderColor: '#6366f1',
        backgroundColor: 'rgba(99,102,241,0.15)',
        fill: true, tension: 0.4, pointRadius: 3,
        pointBackgroundColor: '#6366f1',
      }]
    };
  }, [data]);

  const trendOpts = useMemo(() => ({
    ...baseOpts(dark),
    scales: { x: scaleOpts(dark,'x'), y: scaleOpts(dark,'y',true) },
    plugins: { ...baseOpts(dark).plugins, legend: { display: false } },
  }), [dark]);

  const supplierChartData = useMemo(() => {
    if (!data?.top_suppliers) return null;
    return {
      labels: data.top_suppliers.map(s => s.name.length > 18 ? s.name.slice(0,17)+'…' : s.name),
      datasets: [{
        label: 'Gasto YTD',
        data: data.top_suppliers.map(s => s.amount),
        backgroundColor: COLORS,
        borderRadius: 4,
      }]
    };
  }, [data]);

  const supplierOpts = useMemo(() => ({
    ...baseOpts(dark),
    indexAxis: 'y',
    scales: {
      x: { ...scaleOpts(dark,'x',true), grid:{ color: gridColor(dark) } },
      y: { ticks:{ color: dark ? '#d1d5db' : '#334155', font:{size:10} }, grid:{ color:'transparent' } }
    },
    plugins: { ...baseOpts(dark).plugins, legend:{ display:false } },
  }), [dark]);

  if (error) return <Err msg={error} onRetry={refresh} />;

  const k = data?.kpis || {};
  return (
    <div className="space-y-5 fade">
      {/* KPIs */}
      <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
        <KPI label="Gasto del mes"    value={money(k.spend_month)}    color="indigo"  loading={loading} />
        <KPI label="Gasto YTD"        value={money(k.spend_ytd)}      color="cyan"    loading={loading} />
        <KPI label="OCs este mes"     value={num(k.orders_month)}     color="emerald" loading={loading} />
        <KPI label="OCs borrador"     value={num(k.draft_count)}      color="amber"   loading={loading} />
        <KPI label="OCs confirmadas"  value={num(k.confirmed_count)}  color="violet"  loading={loading} />
        <KPI label="Bajo stock mín."  value={num(k.low_stock_count)}  color="rose"    loading={loading} />
      </div>

      <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
        {/* Trend */}
        <div className="bg-gray-900 border border-gray-800 rounded-xl p-4">
          <h3 className="text-sm font-semibold text-gray-300 mb-3">Tendencia de gasto — últimos 12 meses</h3>
          <div style={{height:220}}>
            {loading ? <Sk h="h-full" /> : trendChartData && <CJChart type="line" data={trendChartData} options={trendOpts} height={220} />}
          </div>
        </div>
        {/* Suppliers */}
        <div className="bg-gray-900 border border-gray-800 rounded-xl p-4">
          <h3 className="text-sm font-semibold text-gray-300 mb-3">Top 10 proveedores por gasto (YTD)</h3>
          <div style={{height:220}}>
            {loading ? <Sk h="h-full" /> : supplierChartData && <CJChart type="bar" data={supplierChartData} options={supplierOpts} height={220} />}
          </div>
        </div>
      </div>

      {/* Transit summary widget */}
      {transitStats.totalOrders > 0 && (
        <div className="grid grid-cols-3 gap-3">
          <div className="bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 flex items-center gap-3">
            <span className="text-2xl">🚢</span>
            <div>
              <p className="text-xs text-gray-500">Pedidos en tránsito</p>
              <p className="text-xl font-bold text-white">{transitStats.totalOrders}</p>
            </div>
          </div>
          <div className="bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 flex items-center gap-3">
            <span className="text-2xl">📦</span>
            <div>
              <p className="text-xs text-gray-500">Contenedores enviados a Odoo</p>
              <p className="text-xl font-bold text-purple-400">{transitStats.totalContainers}</p>
            </div>
          </div>
          <div className={`bg-gray-900 border rounded-xl px-4 py-3 flex items-center gap-3 ${transitStats.arrivingSoon > 0 ? 'border-orange-800/60' : 'border-gray-800'}`}>
            <span className="text-2xl">📅</span>
            <div>
              <p className="text-xs text-gray-500">Llegan en los próximos 30 días</p>
              <p className={`text-xl font-bold ${transitStats.arrivingSoon > 0 ? 'text-orange-400' : 'text-gray-500'}`}>{transitStats.arrivingSoon}</p>
            </div>
          </div>
        </div>
      )}

      {/* Critical stock */}
      {criticalProducts.length > 0 && (
        <div className="bg-gray-900 border border-red-900/40 rounded-xl overflow-hidden">
          <div className="px-4 py-3 border-b border-gray-800 flex items-center justify-between">
            <h3 className="text-sm font-semibold text-red-400">🔴 Stock crítico — menos de 2 meses de cobertura</h3>
            <span className="text-xs text-gray-500">{criticalProducts.length} producto{criticalProducts.length!==1?'s':''}</span>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-xs text-gray-500 uppercase border-b border-gray-800">
                  <th className="px-4 py-2 text-left">Producto</th>
                  <th className="px-4 py-2 text-right">Stock actual</th>
                  <th className="px-4 py-2 text-right">Cobertura</th>
                  <th className="px-4 py-2 text-right">Sugerido</th>
                </tr>
              </thead>
              <tbody>
                {criticalProducts.map(p => {
                  const cov = p.coverage_months;
                  const covCls = cov <= 0 ? 'text-red-400' : cov < 1 ? 'text-orange-400' : 'text-yellow-400';
                  const covLabel = cov <= 0 ? 'Sin stock' : `${cov.toFixed(1)} meses`;
                  return (
                    <tr key={p.product_id} className="border-b border-gray-800/40 hover:bg-gray-800/30">
                      <td className="px-4 py-2.5">
                        <p className="text-gray-200 text-xs truncate max-w-xs" title={p.product_name}>{p.product_name}</p>
                        <p className="text-gray-500 text-xs">{p.old_sku}</p>
                      </td>
                      <td className="px-4 py-2.5 text-right text-gray-300 text-xs">{num(p.qty_available,0)} uds</td>
                      <td className={`px-4 py-2.5 text-right text-xs font-semibold ${covCls}`}>{covLabel}</td>
                      <td className="px-4 py-2.5 text-right text-xs font-bold text-white">{num(p.suggested_qty,0)} uds</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Last orders */}
      <div className="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
        <div className="px-4 py-3 border-b border-gray-800">
          <h3 className="text-sm font-semibold text-gray-300">Últimas 20 órdenes de compra</h3>
        </div>
        {loading
          ? <div className="p-4 space-y-2">{[...Array(5)].map((_,i)=><Sk key={i} h="h-10"/>)}</div>
          : (
            <div className="overflow-x-auto">
              <table className="w-full text-sm">
                <thead>
                  <tr className="text-xs text-gray-500 uppercase border-b border-gray-800">
                    <th className="px-4 py-2 text-left">Número</th>
                    <th className="px-4 py-2 text-left">Proveedor</th>
                    <th className="px-4 py-2 text-left">Fecha</th>
                    <th className="px-4 py-2 text-right">Importe</th>
                    <th className="px-4 py-2 text-center">Estado</th>
                  </tr>
                </thead>
                <tbody>
                  {(data?.last_orders||[]).map(o => {
                    const s = STATE[o.state] || { label:o.state, cls:'bg-gray-700 text-gray-300' };
                    return (
                      <tr key={o.id} className="border-b border-gray-800/40 hover:bg-gray-800/40">
                        <td className="px-4 py-2.5 font-mono text-indigo-400">{o.name}</td>
                        <td className="px-4 py-2.5 text-gray-200">{o.supplier}</td>
                        <td className="px-4 py-2.5 text-gray-400">{o.date}</td>
                        <td className="px-4 py-2.5 text-right font-medium text-white">{money(o.amount)}</td>
                        <td className="px-4 py-2.5 text-center">
                          <span className={`px-2 py-0.5 rounded-full text-xs font-medium ${s.cls}`}>{s.label}</span>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   STOCK ALERTS
══════════════════════════════════════════════════════════════ */
function StockAlerts() {

/* ── Mini sparkline (SVG) ─────────────────────────────────────────────────── */
function Spark({ data, color='#6366f1', w=80, h=28 }) {
  if (!data || data.length < 2) return null;
  const max = Math.max(...data, 0.01);
  const pts = data.map((v,i) => {
    const x = (i / (data.length-1)) * w;
    const y = h - (v / max) * h;
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg width={w} height={h} className="overflow-visible">
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round"/>
    </svg>
  );
}

/* ══════════════════════════════════════════════════════════════
   FORECAST
══════════════════════════════════════════════════════════════ */
function Forecast() {
  const { data, loading, error, refresh } = useApi('/api/forecast');
  const { data: transitData, refresh: refreshTransit } = useApi('/api/transit');
  const dark = useTheme();
  const readOnly = useReadOnly();
  const transitQtyByProduct = useMemo(() => {
    const map = {};
    const now = new Date();
    // Horizon: 6 months from today (exclusive — if arrival === horizon month, it arrives too late)
    const hz = new Date(now.getFullYear(), now.getMonth() + 5, 1);
    const horizonStr = `${hz.getFullYear()}-${String(hz.getMonth()+1).padStart(2,'0')}`;
    (transitData?.orders || []).forEach(o => {
      const arrival = o.expected_arrival; // "YYYY-MM" or ""
      // Count if: no date set (assume it arrives in time) OR arrives strictly before horizon
      if (arrival && arrival >= horizonStr) return;
      o.lines.forEach(l => { map[l.product_id] = (map[l.product_id] || 0) + l.qty; });
    });
    return map;
  }, [transitData]);
  const [refreshing, setRefreshing] = useState(false);
  const hardRefresh = async () => {
    setRefreshing(true);
    await fetch('/api/forecast/refresh');
    await refresh();
    setRefreshing(false);
  };
  const [brandFilter,  setBrandFilter]  = useState(52);   // Titanium Strength default
  const [vendorFilter, setVendorFilter] = useState('all');
  const [search,       setSearch]       = useState('');
  const [quantities,   setQuantities]   = useState({});
  const [expandedPid,  setExpandedPid]  = useState(null);
  const [chartData,    setChartData]    = useState(null);
  const [instruction,  setInstruction]  = useState('');
  const [instrLog,     setInstrLog]     = useState([]);
  const [sortBy,       setSortBy]       = useState('coverage');   // 'coverage' | 'forecast'
  const [urgencyFilter,setUrgencyFilter]= useState(null);         // null | 3 | 5 | 'no_movement'
  const [summaryOpen,  setSummaryOpen]  = useState(false);
  const [selectedPids,  setSelectedPids]  = useState(new Set());
  const [quickAddModal, setQuickAddModal] = useState(null);
  const [quickAddForm,  setQuickAddForm]  = useState({ ref:'', supplier:'', order_date: new Date().toISOString().slice(0,10), expected_arrival:'', targetOrderId:'new' });
  const [quickAddLines, setQuickAddLines] = useState([]);
  const [quickAddSaving,setQuickAddSaving]= useState(false);
  const [existingOrders,setExistingOrders]= useState([]);

  const toggleSelect = (pid) => setSelectedPids(prev => {
    const s = new Set(prev);
    s.has(pid) ? s.delete(pid) : s.add(pid);
    return s;
  });

  const openQuickAdd = async () => {
    // Only include products that have a quantity > 0 in "Cant. Compra"
    const selectedProducts = filtered.filter(p =>
      selectedPids.has(p.product_id) && (parseFloat(quantities[p.product_id]) || 0) > 0
    );
    if (selectedProducts.length === 0) {
      alert('Ningún producto seleccionado tiene unidades en "Cant. Compra". Introduce las cantidades primero.');
      return;
    }
    const firstVendor = selectedProducts[0].vendor || '';
    let existing = [];
    try {
      const r = await fetch('/api/transit');
      const j = await r.json();
      existing = (j.orders || []).filter(o => (o.status||'active') === 'active');
    } catch(e) {}
    setExistingOrders(existing);
    setQuickAddLines(selectedProducts.map(p => ({
      product_id: p.product_id,
      product_name: p.product_name,
      qty: parseFloat(quantities[p.product_id]),   // exact qty from input, no fallback
      price: p.vendor_price || p.avg_price || 0,
    })));
    setQuickAddForm({ ref:'', supplier: firstVendor, order_date: new Date().toISOString().slice(0,10), expected_arrival:'', targetOrderId:'new' });
    setQuickAddModal(true);
  };

  const saveQuickAdd = async () => {
    if (!quickAddForm.ref && quickAddForm.targetOrderId === 'new') return;
    setQuickAddSaving(true);
    try {
      const linesToSave = quickAddLines.filter(l => (parseFloat(l.qty)||0) > 0);
      if (linesToSave.length === 0) { setQuickAddSaving(false); return; }
      let res;
      if (quickAddForm.targetOrderId === 'new') {
        res = await fetch('/api/transit', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ ref: quickAddForm.ref, supplier: quickAddForm.supplier, order_date: quickAddForm.order_date, expected_arrival: quickAddForm.expected_arrival, lines: linesToSave }),
        });
      } else {
        const r = await fetch('/api/transit');
        const j = await r.json();
        const order = j.orders.find(o => o.id === quickAddForm.targetOrderId);
        if (order) {
          const existingPids = new Set(order.lines.map(l => l.product_id));
          const merged = [...order.lines, ...linesToSave.filter(l => !existingPids.has(l.product_id))];
          res = await fetch(`/api/transit/${order.id}`, {
            method:'PATCH', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ ...order, lines: merged }),
          });
        }
      }
      if (res && !res.ok) {
        const errText = await res.text();
        alert(`Error al guardar: ${res.status} — ${errText}`);
        setQuickAddSaving(false);
        return;
      }
      setQuickAddModal(null);
      setSelectedPids(new Set());
      // Refresh transit data so the new order appears immediately
      refreshTransit();
    } catch(e) {
      alert(`Error de red: ${e.message}`);
    }
    setQuickAddSaving(false);
  };
  const [drafts,       setDrafts]       = useState(() => {
    try { return JSON.parse(localStorage.getItem('opi_drafts') || '[]'); } catch { return []; }
  });

  const products = data?.products || [];
  const brands   = data?.brands   || [];

  // Vendors for the selected brand (sorted alphabetically)
  const vendorsForBrand = useMemo(() => {
    const byBrand = products.filter(p => brandFilter === 'all' || p.brand_id === brandFilter);
    const seen = {};
    byBrand.forEach(p => { if (p.vendor && p.vendor !== '—') seen[p.vendor] = true; });
    return Object.keys(seen).sort();
  }, [products, brandFilter]);

  // Reset vendor filter when brand changes
  const selectBrand = (bid) => { setBrandFilter(bid); setVendorFilter('all'); setExpandedPid(null); };

  // Urgency counts for badge/filters (across current brand, ignoring urgencyFilter)
  const urgentCount  = useMemo(() => products.filter(p =>
    (brandFilter === 'all' || p.brand_id === brandFilter) &&
    !p.no_movement && p.coverage_months < 5 && p.coverage_months > -99
  ).length, [products, brandFilter]);
  const criticalCount = useMemo(() => products.filter(p =>
    (brandFilter === 'all' || p.brand_id === brandFilter) &&
    !p.no_movement && p.coverage_months < 3 && p.coverage_months > -99
  ).length, [products, brandFilter]);
  const noMovementCount = useMemo(() => products.filter(p =>
    (brandFilter === 'all' || p.brand_id === brandFilter) &&
    (p.no_movement || p.no_recent_sales)
  ).length, [products, brandFilter]);

  const filtered = useMemo(() => {
    let list = products.filter(p => {
      const brandOk  = brandFilter === 'all' || p.brand_id === brandFilter;
      const vendorOk = vendorFilter === 'all' || p.vendor === vendorFilter;
      const searchOk = !search || p.product_name.toLowerCase().includes(search.toLowerCase());
      if (urgencyFilter === 'no_movement') {
        return brandOk && vendorOk && searchOk && (p.no_movement || p.no_recent_sales);
      }
      // Normal mode: always hide pure no_movement products (0 sales 12m)
      if (p.no_movement) return false;
      return brandOk && vendorOk && searchOk &&
        (urgencyFilter === null || (p.coverage_months < urgencyFilter && p.coverage_months > -99));
    });
    if (sortBy === 'coverage') {
      list = [...list].sort((a, b) => a.coverage_months - b.coverage_months);
    }
    if (urgencyFilter === 'no_movement') {
      list = [...list].sort((a, b) => (b.qty_available||0) - (a.qty_available||0));
    }
    return list;
  }, [products, brandFilter, vendorFilter, search, urgencyFilter, sortBy]);

  // Totals for footer
  const totalQtyToBuy   = useMemo(() => filtered.reduce((a,p) => a + (parseFloat(quantities[p.product_id])||0), 0), [filtered, quantities]);
  const totalAmountToBuy= useMemo(() => filtered.reduce((a,p) => a + (parseFloat(quantities[p.product_id])||0)*(p.vendor_price||p.avg_price), 0), [filtered, quantities]);
  const totalVelocity   = useMemo(() => filtered.reduce((a,p) => a + p.monthly_velocity, 0), [filtered]);
  const totalForecast   = useMemo(() => filtered.reduce((a,p) => a + p.total_forecast_qty, 0), [filtered]);

  // Resumen por fábrica — usa TODOS los productos (todas las marcas) con cantidad asignada
  // Así al cambiar de marca el resumen global se mantiene
  const summaryByVendor = useMemo(() => {
    const map = {};
    products.forEach(p => {
      const qty = parseFloat(quantities[p.product_id]) || 0;
      if (qty <= 0) return;
      const vendor = p.vendor || '—';
      const price  = p.vendor_price || p.avg_price || 0;
      if (!map[vendor]) map[vendor] = { vendor, products: 0, units: 0, amount: 0, items: [] };
      map[vendor].products += 1;
      map[vendor].units    += qty;
      map[vendor].amount   += qty * price;
      map[vendor].items.push({
        name: p.product_name, brand: p.brand_name, qty, price,
        total: qty * price, code: p.vendor_code
      });
    });
    return Object.values(map).sort((a, b) => b.amount - a.amount);
  }, [products, quantities]);

  // Totals across ALL brands (for the summary footer)
  const summaryTotalUnits  = useMemo(() => summaryByVendor.reduce((a,v) => a+v.units,  0), [summaryByVendor]);
  const summaryTotalAmount = useMemo(() => summaryByVendor.reduce((a,v) => a+v.amount, 0), [summaryByVendor]);

  // Pre-fill quantities: use backend-calculated suggested_qty
  // = max(0, 6-month sales forecast − virtual_available)
  // Only fills products that actually need ordering (suggested_qty > 0)
  // Draft save / load / export / import
  const saveDraft = () => {
    const name = window.prompt('Nombre del borrador:', `Plan ${new Date().toLocaleDateString('es-ES')}`);
    if (!name) return;
    const filled = Object.entries(quantities).filter(([,v]) => parseFloat(v) > 0);
    const draft = {
      name,
      date: new Date().toISOString().slice(0,10),
      quantities: Object.fromEntries(filled),
      meta: {
        total_units:  filled.reduce((a,[,v]) => a + parseFloat(v), 0),
        total_amount: filled.reduce((a,[pid,v]) => {
          const p = products.find(x => x.product_id == pid);
          return a + parseFloat(v) * (p?.vendor_price || p?.avg_price || 0);
        }, 0),
        products_count: filled.length,
      }
    };
    const updated = [...drafts, draft];
    setDrafts(updated);
    localStorage.setItem('opi_drafts', JSON.stringify(updated));
  };

  const loadDraft = (draft) => setQuantities(draft.quantities);

  const deleteDraft = (idx) => {
    if (!window.confirm('¿Eliminar este borrador?')) return;
    const updated = drafts.filter((_,i) => i !== idx);
    setDrafts(updated);
    localStorage.setItem('opi_drafts', JSON.stringify(updated));
  };

  const exportDraft = (draft) => {
    const blob = new Blob([JSON.stringify(draft, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `${draft.name.replace(/[^a-z0-9]/gi,'_')}_${draft.date}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importDraft = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const draft = JSON.parse(ev.target.result);
        if (!draft.quantities) throw new Error('Formato inválido');
        const updated = [...drafts, { ...draft, name: draft.name + ' (importado)', date: new Date().toISOString().slice(0,10) }];
        setDrafts(updated);
        localStorage.setItem('opi_drafts', JSON.stringify(updated));
        setQuantities(draft.quantities);
      } catch { alert('Archivo JSON inválido'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const prefillForecast = () => {
    const upd = {};
    filtered.forEach(p => {
      const transit = transitQtyByProduct[p.product_id] || 0;
      const adjusted = Math.max(0, Math.round(p.total_forecast_qty - (p.virtual_available + transit)));
      if (adjusted > 0) upd[p.product_id] = adjusted;
    });
    setQuantities(prev => ({...prev, ...upd}));
  };
  const clearQuantities = () => setQuantities({});

  // ── Natural-language instruction parser ────────────────────────────────────
  const applyInstruction = () => {
    const raw = instruction.trim();
    if (!raw) return;
    const text = raw.toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g, '')  // strip accents
      .trim();

    let result = { ...quantities };
    const msgs = [];

    // Helper: ensure a product has a base quantity (auto-fill if 0/empty)
    const base = (p) => {
      const v = parseFloat(result[p.product_id]);
      if (v > 0) return v;
      // auto-seed with backend suggested_qty
      return p.suggested_qty || 0;
    };

    // ── 1. RESET / LIMPIAR ──
    if (/^(limpiar?|borrar?|reset|reiniciar?|vaciar?|clear)/.test(text)) {
      result = {};
      msgs.push('✓ Cantidades limpiadas');
    }

    // ── 2. RELLENAR pronóstico desde cero ──
    else if (/^(rellena(r)?|pronostico|calcular?|auto)/.test(text)) {
      let filled = 0;
      filtered.forEach(p => {
        if ((p.suggested_qty || 0) > 0) { result[p.product_id] = p.suggested_qty; filled++; }
      });
      msgs.push(`✓ ${filled} productos rellenados (ventas 5m − stock disponible)`);
    }

    else {
      let matched = false;

      // ── 3. MULTIPLICAR ── "multiplica por 1.5", "x1.5", "×1.5", "*1.5", "factor 1.5"
      const mulM = text.match(/(?:multiplica(?:\s+por)?|factor|[×x\*])\s*(\d+(?:[.,]\d+)?)/);
      if (mulM) {
        const f = parseFloat(mulM[1].replace(',', '.'));
        if (!isNaN(f) && f > 0) {
          filtered.forEach(p => { result[p.product_id] = Math.ceil(base(p) * f); });
          msgs.push(`✓ Multiplicado por ${f}`);
          matched = true;
        }
      }

      // ── 4. AUMENTAR % ── "aumenta 20%", "+20%", "añade 20%", "incrementa 20%", "margen 20%"
      const addM = text.match(/(?:aumenta(?:r)?|aniade?(?:r)?|incrementa(?:r)?|margen|\+)\s*(\d+(?:[.,]\d+)?)\s*%/);
      if (addM) {
        const pct = parseFloat(addM[1].replace(',', '.')) / 100;
        if (!isNaN(pct) && pct > 0) {
          filtered.forEach(p => { result[p.product_id] = Math.ceil(base(p) * (1 + pct)); });
          msgs.push(`✓ Aumentado un ${Math.round(pct*100)}%`);
          matched = true;
        }
      }

      // ── 5. REDUCIR % ── "reduce 20%", "baja 20%", "descuenta 20%", "-20%"
      const redM = text.match(/(?:reduce?(?:ir)?|baja(?:r)?|disminuye?(?:ir)?|descuenta?|-)\s*(\d+(?:[.,]\d+)?)\s*%/);
      if (redM) {
        const pct = parseFloat(redM[1].replace(',', '.')) / 100;
        if (!isNaN(pct) && pct > 0) {
          filtered.forEach(p => { result[p.product_id] = Math.max(0, Math.ceil(base(p) * (1 - pct))); });
          msgs.push(`✓ Reducido un ${Math.round(pct*100)}%`);
          matched = true;
        }
      }

      // ── 6. MÍNIMO ── "mínimo 5", "min 5", "al menos 5"
      const minM = text.match(/(?:minimo|min|al\s+menos)\s*(\d+)/);
      if (minM) {
        const minVal = parseInt(minM[1]);
        if (!isNaN(minVal) && minVal >= 0) {
          filtered.forEach(p => { result[p.product_id] = Math.max(base(p), minVal); });
          msgs.push(`✓ Mínimo ${minVal} uds por producto`);
          matched = true;
        }
      }

      // ── 7. MÁXIMO ── "máximo 50", "max 50"
      const maxM = text.match(/(?:maximo|max(?:imo)?)\s*(\d+)/);
      if (maxM) {
        const maxVal = parseInt(maxM[1]);
        if (!isNaN(maxVal) && maxVal >= 0) {
          filtered.forEach(p => { result[p.product_id] = Math.min(base(p), maxVal); });
          msgs.push(`✓ Máximo ${maxVal} uds por producto`);
          matched = true;
        }
      }

      // ── 8. REDONDEAR A MÚLTIPLOS ── "redondea a 6", "múltiplos de 6", "cajas de 6", "packs de 12"
      const rndM = text.match(/(?:redondea(?:\s+a)?|multiplos?\s+de|cajas?\s+de|packs?\s+de|unidades?\s+de|lotes?\s+de)\s*(\d+)/);
      if (rndM) {
        const mult = parseInt(rndM[1]);
        if (!isNaN(mult) && mult > 0) {
          filtered.forEach(p => {
            const b = base(p);
            result[p.product_id] = b > 0 ? Math.ceil(b / mult) * mult : 0;
          });
          msgs.push(`✓ Redondeado a múltiplos de ${mult}`);
          matched = true;
        }
      }

      // ── 9. MESES DE SEGURIDAD ── "2 meses de seguridad", "añade 1 mes de stock"
      const msM = text.match(/(\d+(?:[.,]\d+)?)\s*meses?\s+(?:de\s+)?(?:seguridad|stock|extra|buffer)/);
      if (msM) {
        const months = parseFloat(msM[1].replace(',', '.'));
        if (!isNaN(months) && months > 0) {
          filtered.forEach(p => {
            const monthly = p.total_forecast_qty / 3;
            const safety  = Math.ceil(months * monthly);
            result[p.product_id] = base(p) + safety;
          });
          msgs.push(`✓ Añadido ${months} mes(es) de stock de seguridad`);
          matched = true;
        }
      }

      // ── 10. SOLO DÉFICIT / SOLO NEGATIVOS ──
      if (/solo\s+(?:deficit|negativos?|rotura|los\s+que\s+faltan|urgentes?)/.test(text) ||
          /sin\s+stock/.test(text)) {
        filtered.forEach(p => { if (p.virtual_available >= 0) delete result[p.product_id]; });
        msgs.push('✓ Solo productos con stock negativo / déficit');
        matched = true;
      }

      // ── 11. SUMAR CANTIDAD FIJA ── "suma 10", "añade 5 unidades"
      const sumM = text.match(/(?:suma(?:r)?|aniade?(?:r)?|agrega(?:r)?)\s*(\d+)\s*(?:u(?:ds?|nidades?)?)?(?:\s+a\s+todo)?/);
      if (sumM && !addM) {  // avoid conflict with % increase
        const add = parseInt(sumM[1]);
        if (!isNaN(add) && add > 0) {
          filtered.forEach(p => { result[p.product_id] = base(p) + add; });
          msgs.push(`✓ Sumado ${add} uds a cada producto`);
          matched = true;
        }
      }

      if (!matched) {
        setInstrLog(prev => [{text: raw, ok: false, msg: '❓ No entendí la instrucción'}, ...prev.slice(0,4)]);
        setInstruction('');
        return;
      }
    }

    setQuantities(result);
    setInstrLog(prev => [{text: raw, ok: true, msg: msgs.join(' · ')}, ...prev.slice(0,4)]);
    setInstruction('');
  };

    const wb = XLSX.utils.book_new();

    XLSX.writeFile(wb, `compras_${brand?.name||'todos'}_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

                {entry.ok ? '✓' : '✗'} {entry.text}
                {entry.ok && <span className="ml-1 text-indigo-500">— {entry.msg.replace('✓ ','')}</span>}
              </span>
            ))}
          </div>
        )}
        {/* Clickable command suggestions */}
        <div className="flex flex-wrap gap-1.5 pt-0.5">
          {[
            { label:'✨ Rellena',            cmd:'rellena',                  desc:'Calcular desde cero (déficit + pronóstico)',   color:'indigo' },
            { label:'📈 Aumenta 20%',        cmd:'aumenta 20%',              desc:'Subir todas las cantidades un 20%',            color:'emerald' },
            { label:'📉 Reduce 10%',         cmd:'reduce 10%',               desc:'Bajar todas las cantidades un 10%',            color:'rose' },
            { label:'✖️ ×1.5',              cmd:'multiplica por 1.5',       desc:'Multiplicar cada cantidad por 1.5',            color:'violet' },
            { label:'📦 Cajas de 6',         cmd:'cajas de 6',               desc:'Redondear al múltiplo de 6 más cercano',       color:'amber' },
            { label:'⬇️ Mínimo 5',          cmd:'mínimo 5',                 desc:'Al menos 5 uds por producto',                  color:'cyan' },
            { label:'⬆️ Máximo 100',        cmd:'máximo 100',               desc:'Limitar a 100 uds por producto',               color:'cyan' },
            { label:'🛡️ +2 meses seguridad',cmd:'2 meses de seguridad',     desc:'Añadir 2 meses de demanda extra como buffer',  color:'teal' },
            { label:'🔴 Solo déficit',       cmd:'solo déficit',             desc:'Dejar solo los productos con stock negativo',  color:'red' },
            { label:'🗑️ Limpiar',           cmd:'limpiar',                  desc:'Borrar todas las cantidades',                  color:'gray' },
          ].map(({ label, cmd, desc, color }) => {
            const cls = {
              indigo: 'border-indigo-800/60 text-indigo-300 hover:bg-indigo-900/60',
              emerald:'border-emerald-800/60 text-emerald-300 hover:bg-emerald-900/60',
              rose:   'border-rose-800/60 text-rose-300 hover:bg-rose-900/60',
              violet: 'border-violet-800/60 text-violet-300 hover:bg-violet-900/60',
              amber:  'border-amber-800/60 text-amber-300 hover:bg-amber-900/60',
              cyan:   'border-cyan-800/60 text-cyan-300 hover:bg-cyan-900/60',
              teal:   'border-teal-800/60 text-teal-300 hover:bg-teal-900/60',
              red:    'border-red-800/60 text-red-300 hover:bg-red-900/60',
              gray:   'border-gray-700/60 text-gray-400 hover:bg-gray-800/60',
            }[color];
            return (
              <button
                key={cmd}
                title={desc}
                onClick={() => { setInstruction(cmd); }}
                className={`px-2.5 py-1 rounded-full text-xs border bg-transparent transition-colors cursor-pointer ${cls}`}>
                {label}
              </button>
            );
          })}
        </div>
      </div>

      {/* ── Main table ── */}
      <div className="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
        {loading ? (
          <div className="p-4 space-y-2">{[...Array(8)].map((_,i)=><Sk key={i} h="h-12"/>)}</div>
        ) : (
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-xs text-gray-500 uppercase border-b border-gray-800 bg-gray-900/80">
                  <th className="px-3 py-2.5 text-left sticky left-0 bg-gray-900 z-10">Producto</th>
                  <th className="px-3 py-2.5 text-right" title="Unidades físicas en almacén ahora mismo">Stock Actual</th>
                  <th className="px-3 py-2.5 text-right text-cyan-500" title="OCs confirmadas pendientes de recibir">+ Entradas</th>
                  <th className="px-3 py-2.5 text-right text-orange-500" title="Pedidos de venta confirmados pendientes de servir">− Salidas</th>
                  <th className="px-3 py-2.5 text-right text-emerald-500" title="Stock Actual + Entradas − Salidas = lo que tendrás disponible">= Previsto</th>
                  <th className="px-3 py-2.5 text-right text-indigo-400" title="Tendencia de ventas (suavizado exponencial sobre historial de ventas)">Histórico</th>
                  <th className="px-3 py-2.5 text-right text-indigo-400" title="Unidades vendidas por mes de media (últimos 3 meses)">Venta/mes</th>
                  <th className="px-3 py-2.5 text-right text-indigo-400" title="Ventas proyectadas en los próximos 5 meses (lead time contenedor)">Pron. 5m</th>
                  <th className="px-3 py-2.5 text-center" title="Meses de cobertura = stock previsto ÷ ventas mensuales. Rojo &lt;3m, Naranja 3-5m, Verde &gt;5m">Cobertura</th>
                  <th className="px-3 py-2.5 text-center" title="Tendencia de ventas (últimos 6 meses)">Tend.</th>
                  <th className="px-3 py-2.5 text-right" title="Precio del proveedor preferido">Precio</th>
                  <th className="px-3 py-2.5 text-center text-emerald-400 w-28">Cant. compra</th>
                  <th className="px-3 py-2.5 text-right text-emerald-400">Total</th>
                  {!readOnly && <th className="px-3 py-2.5 text-center w-8" title="Seleccionar productos con cantidad > 0">
                    <input type="checkbox" className="accent-amber-500 cursor-pointer w-3.5 h-3.5"
                      checked={filtered.some(p => (parseFloat(quantities[p.product_id])||0) > 0 && selectedPids.has(p.product_id)) && filtered.filter(p => (parseFloat(quantities[p.product_id])||0) > 0).every(p => selectedPids.has(p.product_id))}
                      onChange={e => { if(e.target.checked) setSelectedPids(new Set(filtered.filter(p=>(parseFloat(quantities[p.product_id])||0)>0).map(p=>p.product_id))); else setSelectedPids(new Set()); }} />
                  </th>}
                  <th className="px-3 py-2.5 text-center w-8"></th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(p => {
                  const tc2     = TREND[p.trend];
                  const isExp   = expandedPid === p.product_id;
                  const qty     = quantities[p.product_id] ?? '';
                  const price   = p.vendor_price || p.avg_price || 0;
                  const total   = (parseFloat(qty)||0) * price;
                  const qtyNum  = parseFloat(qty)||0;

                  // Transit adjustment
                  const transitQty     = transitQtyByProduct[p.product_id] || 0;
                  const adjVirtual     = p.virtual_available + transitQty;
                  const adjCoverage    = p.monthly_velocity > 0 ? adjVirtual / p.monthly_velocity : 99;
                  const adjSuggested   = Math.max(0, Math.round(p.total_forecast_qty - adjVirtual));

                  // Stock real color
                  const stockCls = p.qty_available <= 0 ? 'text-red-400 font-bold'
                    : p.qty_available < 3 ? 'text-orange-400 font-semibold'
                    : 'text-gray-200';

                  return (
                    <React.Fragment key={p.product_id}>
                      <tr className={`border-b border-gray-800/40 hover:bg-gray-800/30 transition-colors ${isExp ? 'bg-indigo-950/30' : ''}`}>
                        <td className="px-3 py-2.5 sticky left-0 bg-gray-900 z-10 min-w-0 group/name relative" style={{maxWidth:260}}>
                          <div className="truncate text-gray-200 font-medium text-xs" title={p.product_name}>
                            {p.is_kit && <span className="mr-1 text-amber-500" title="Kit — stock calculado desde componentes">🧩</span>}
                            {p.product_name}
                          </div>
                          <div className="absolute left-0 top-full mt-1 z-50 hidden group-hover/name:block bg-gray-800 border border-gray-600 rounded-lg px-3 py-2 text-xs text-gray-100 shadow-xl whitespace-normal max-w-xs pointer-events-none" style={{minWidth:200}}>
                            {p.product_name}
                          </div>
                          <div className="flex items-center gap-1.5 mt-0.5">
                            <span className={`text-xs ${tc2?.cls}`}>{tc2?.icon}</span>
                            {p.vendor_code && <span className="text-xs text-gray-600 font-mono">{p.vendor_code}</span>}
                          </div>
                        </td>
                        {/* Stock Actual */}
                        <td className={`px-3 py-2.5 text-right text-xs font-semibold ${stockCls}`}>{num(p.qty_available,0)}</td>
                        {/* + Entradas (Odoo + tránsito) */}
                        <td className="px-3 py-2.5 text-right text-xs">
                          {p.incoming_qty > 0 && <div className="text-cyan-400">+{num(p.incoming_qty,0)}</div>}
                          {transitQty > 0 && <div className="text-amber-400" title="Pedido en tránsito (no en Odoo aún)">🚢+{num(transitQty,0)}</div>}
                          {p.incoming_qty === 0 && transitQty === 0 && <span className="text-gray-600">—</span>}
                        </td>
                        {/* − Salidas */}
                        <td className="px-3 py-2.5 text-right text-xs text-orange-400">{p.outgoing_qty > 0 ? '−'+num(p.outgoing_qty,0) : <span className="text-gray-600">—</span>}</td>
                        {/* = Previsto (ajustado con tránsito) */}
                        <td className={`px-3 py-2.5 text-right text-xs font-semibold ${adjVirtual < 0 ? 'text-red-400' : 'text-emerald-400'}`}
                            title={transitQty > 0 ? `Sin tránsito: ${num(p.virtual_available,0)} · Con tránsito: ${num(adjVirtual,0)}` : ''}>
                          {num(adjVirtual,0)}{transitQty > 0 && <span className="text-amber-500 ml-0.5" style={{fontSize:9}}>🚢</span>}
                        </td>
                        {/* Histórico sparkline */}
                        <td className="px-3 py-2.5 text-right">
                          <Spark data={(p.history||[]).map(h=>h.qty)} color="#6366f1" />
                        </td>
                        {/* Venta/mes */}
                        <td className="px-3 py-2.5 text-right text-xs text-indigo-300 font-semibold">
                          {num(p.monthly_velocity,1)}
                        </td>
                        {/* Pron. 5m total */}
                        <td className="px-3 py-2.5 text-right text-xs text-indigo-300 font-semibold">
                          {num(p.total_forecast_qty,0)}
                        </td>
                        {/* Cobertura con semáforo (ajustada con tránsito) */}
                        <td className="px-3 py-2.5 text-center">
                          {(() => {
                            const cm = adjCoverage;
                            if (cm >= 99) return <span className="text-xs text-gray-600">—</span>;
                            const cls = cm < 3 ? 'text-red-400 font-bold' : cm < 5 ? 'text-orange-400 font-semibold' : 'text-emerald-400';
                            const icon = cm < 3 ? '🔴' : cm < 5 ? '🟠' : '🟢';
                            return <span className={`text-xs ${cls}`}>{icon} {num(cm,1)}m</span>;
                          })()}
                        </td>
                        {/* Tendencia */}
                        <td className="px-3 py-2.5 text-center">
                          {p.no_movement
                            ? <span className="text-xs text-purple-500" title="Sin ventas en 12 meses">🚫</span>
                            : <span className={`text-xs ${TREND[p.trend]?.cls}`} title={TREND[p.trend]?.label}>{TREND[p.trend]?.icon}</span>
                          }
                        </td>
                        <td className="px-3 py-2.5 text-right text-xs text-gray-400">{money(price)}</td>
                        <td className="px-3 py-2.5 text-center">
                          {readOnly
                            ? <span className={`text-sm font-semibold ${qtyNum > 0 ? 'text-emerald-300' : 'text-gray-600'}`}>{qtyNum > 0 ? num(qtyNum,0) : '—'}</span>
                            : <input
                                type="number" min="0" step="1"
                                value={qty}
                                onChange={e => setQuantities(prev => ({...prev, [p.product_id]: e.target.value}))}
                                placeholder="0"
                                className={`w-20 px-2 py-1 rounded-lg text-sm text-center border transition-colors
                                  bg-gray-800 focus:outline-none focus:border-emerald-500
                                  ${qtyNum > 0 ? 'border-emerald-600 text-emerald-300 font-semibold' : 'border-gray-600 text-gray-300'}`}
                              />
                          }
                        </td>
                        <td className={`px-3 py-2.5 text-right text-xs font-semibold ${total > 0 ? 'text-emerald-400' : 'text-gray-600'}`}>
                          {total > 0 ? money(total) : '—'}
                        </td>
                        {!readOnly && <td className="px-3 py-2.5 text-center">
                          <input type="checkbox" className="accent-amber-500 cursor-pointer w-3.5 h-3.5"
                            checked={selectedPids.has(p.product_id)}
                            onChange={() => toggleSelect(p.product_id)} />
                        </td>}
                        <td className="px-3 py-2.5 text-center">
                          <button onClick={()=>toggleChart(p)}
                            className={`text-xs px-1.5 py-0.5 rounded transition-colors ${isExp ? 'text-indigo-400 bg-indigo-900/40' : 'text-gray-600 hover:text-gray-400'}`}
                            title="Ver gráfica">
                            {isExp ? '▲' : '▼'}
                          </button>
                        </td>
                      </tr>

                      {/* Expanded chart row */}
                      {isExp && chartData && (
                        <tr className="border-b border-gray-700 bg-indigo-950/20">
                          <td colSpan="13" className="px-4 py-4">
                            <div className="flex gap-6 items-start">
                              <div className="flex-1" style={{height:190}}>
                                <CJChart type="bar" data={chartData.data} options={chartOpts} height={190}/>
                              </div>
                              {/* Stats sidebar */}
                              <div className="shrink-0 grid grid-cols-2 gap-x-6 gap-y-3 text-xs w-72">
                                {[
                                  { label:'Ventas 12m', val: num((p.history||[]).reduce((a,h)=>a+h.qty,0),0)+' uds' },
                                  { label:'Mes pico', val: (() => { const mx=(p.history||[]).reduce((a,h)=>h.qty>a.qty?h:a,{qty:0,month:'—'}); return `${mx.month} (${num(mx.qty,0)})` })() },
                                  { label:'Vel. media', val: num(p.monthly_velocity,1)+' uds/mes', cls:'text-indigo-300' },
                                  { label:'Pron. 5m', val: num(p.total_forecast_qty,0)+' uds', cls:'text-cyan-300' },
                                  { label:'Cobertura', val: p.coverage_months>=99 ? '—' : num(p.coverage_months,1)+'m',
                                    cls: p.coverage_months<3?'text-red-400':p.coverage_months<5?'text-orange-400':'text-emerald-400' },
                                  { label:'Tendencia', val: (TREND[p.trend]?.icon||'')+' '+(TREND[p.trend]?.label||p.trend), cls: TREND[p.trend]?.cls },
                                  { label:'Proveedor', val: p.vendor, cls:'text-gray-200 col-span-2 truncate' },
                                  { label:'Precio unit.', val: money(price), cls:'text-white font-bold' },
                                  { label:'Próx. salidas', val: num(p.outgoing_qty,0)+' uds', cls:'text-orange-400' },
                                  { label:'Sin venta reciente', val: p.no_recent_sales?'Sí (>3m)':'No', cls: p.no_recent_sales?'text-yellow-400':'text-emerald-400' },
                                ].map(({label,val,cls=''}) => (
                                  <div key={label} className={cls.includes('col-span-2') ? 'col-span-2' : ''}>
                                    <p className="text-gray-600 uppercase tracking-wide" style={{fontSize:9}}>{label}</p>
                                    <p className={`font-semibold truncate ${cls || 'text-gray-300'}`}>{val}</p>
                                  </div>
                                ))}
                              </div>
                            </div>
                          </td>
                        </tr>
                      )}
                    </React.Fragment>
                  );
                })}
              </tbody>
              {/* Footer totals */}
              <tfoot className="border-t-2 border-gray-700 bg-gray-900/80">
                <tr>
                  <td className="px-3 py-2.5 text-xs font-bold text-gray-300 sticky left-0 bg-gray-900">TOTAL ({filtered.length} productos)</td>
                  <td colSpan="3"></td>
                  <td className="px-3 py-2.5 text-right text-xs text-indigo-400"></td>
                  <td className="px-3 py-2.5 text-right text-xs text-indigo-300 font-semibold">{num(totalVelocity,1)}<span className="text-gray-600 ml-0.5">u/m</span></td>
                  <td className="px-3 py-2.5 text-right text-xs text-indigo-300 font-semibold">{num(totalForecast,0)}</td>
                  <td colSpan="2"></td>
                  <td className="px-3 py-2.5 text-center text-xs text-emerald-300 font-bold">{num(totalQtyToBuy,0)} uds</td>
                  <td className="px-3 py-2.5 text-right text-xs text-emerald-400 font-bold">{money(totalAmountToBuy)}</td>
                  <td></td>
                </tr>
              </tfoot>
            </table>
          </div>
        )}
      </div>

      {/* Spacer so content doesn't hide behind floating bars */}
      {!readOnly && (summaryByVendor.length > 0 || selectedPids.size > 0) && (
        <div style={{height: (summaryByVendor.length > 0 ? (summaryOpen ? 360 : 56) : 0) + (selectedPids.size > 0 ? 56 : 0)}} />
      )}

      {/* ── Floating selection bar (above summary) ── */}
      {!readOnly && selectedPids.size > 0 && (
        <div className="fixed left-0 right-0 z-30 fade"
          style={{bottom: summaryByVendor.length > 0 ? (summaryOpen ? 360 : 56) : 0, background:'#1c1917', borderTop:'1px solid #d97706'}}>
          <div className="px-5 py-3 flex items-center gap-4">
            <span className="text-sm text-amber-400 font-semibold">
              ✓ {selectedPids.size} producto{selectedPids.size!==1?'s':''} seleccionado{selectedPids.size!==1?'s':''}
            </span>
            <button onClick={openQuickAdd}
              className="px-4 py-1.5 rounded-lg text-sm bg-amber-600 hover:bg-amber-500 text-white font-semibold transition-colors">
              📦 Crear pedido en tránsito
            </button>
            <button onClick={() => setSelectedPids(new Set())}
              className="ml-auto text-xs text-gray-500 hover:text-gray-300 transition-colors">
              Limpiar selección ×
            </button>
          </div>
        </div>
      )}

      {/* ── Floating sticky summary bar ── */}
      {!readOnly && summaryByVendor.length > 0 && (
        <div className="fixed bottom-0 left-0 right-0 z-20 border-t border-gray-700/80 shadow-2xl fade"
             style={{background: dark ? '#0f172a' : '#ffffff'}}>

          {/* Expanded vendor list */}
          {summaryOpen && (
            <div className="max-h-72 overflow-y-auto border-b border-gray-800 divide-y divide-gray-800/60">
              {summaryByVendor.map(v => (
                <VendorSummaryRow key={v.vendor} row={v} totalAmount={summaryTotalAmount} />
              ))}
            </div>
          )}

          {/* Always-visible header bar */}
          <button onClick={() => setSummaryOpen(o => !o)}
            className="w-full px-5 py-3 flex items-center justify-between hover:bg-gray-800/40 transition-colors">
            <div className="flex items-center gap-3">
              <span className="text-sm font-semibold text-gray-200">🏭 Resumen por fábrica</span>
              <span className="text-xs text-gray-500">
                {summaryByVendor.length} fábrica{summaryByVendor.length>1?'s':''} · {num(summaryTotalUnits,0)} uds
              </span>
            </div>
            <div className="flex items-center gap-4">
              <span className="text-base font-bold text-emerald-400">{money(summaryTotalAmount)}</span>
              <span className="text-gray-500 text-xs">{summaryOpen ? '▼' : '▲'}</span>
            </div>
          </button>
        </div>
      )}
    </div>
  );
}

/* ── Vendor summary row (collapsible) ─────────────────────── */
function VendorSummaryRow({ row, totalAmount }) {
  const [open, setOpen] = useState(false);
  const pct = totalAmount > 0 ? (row.amount / totalAmount) * 100 : 0;

  return (
    <div>
      <button
        onClick={() => setOpen(o => !o)}
        className="w-full px-4 py-3 flex items-center gap-4 hover:bg-gray-800/40 transition-colors text-left">
        {/* Vendor name */}
        <span className="text-sm font-medium text-gray-200 w-64 shrink-0 truncate">{row.vendor}</span>
        {/* Bar */}
        <div className="flex-1 flex items-center gap-2">
          <div className="flex-1 bg-gray-800 rounded-full h-1.5 max-w-48">
            <div className="h-1.5 rounded-full bg-indigo-500" style={{width:`${Math.min(pct,100)}%`}} />
          </div>
          <span className="text-xs text-gray-500 w-10 text-right">{pct.toFixed(0)}%</span>
        </div>
        {/* Counts */}
        <span className="text-xs text-gray-500 w-24 text-right">{row.products} producto{row.products>1?'s':''}</span>
        <span className="text-xs text-gray-400 w-20 text-right">{num(row.units,0)} uds</span>
        <span className="text-sm font-bold text-emerald-400 w-28 text-right">{money(row.amount)}</span>
        <span className="text-gray-600 text-xs ml-1">{open ? '▲' : '▼'}</span>
      </button>

      {/* Expanded product list */}
      {open && (
        <div className="bg-gray-950/50 border-t border-gray-800/40">
          <table className="w-full text-xs">
            <thead>
              <tr className="text-gray-600 uppercase border-b border-gray-800/40">
                <th className="px-6 py-1.5 text-left">Producto</th>
                <th className="px-4 py-1.5 text-right">Cód. proveedor</th>
                <th className="px-4 py-1.5 text-right">Cant.</th>
                <th className="px-4 py-1.5 text-right">Precio unit.</th>
                <th className="px-4 py-1.5 text-right">Total</th>
              </tr>
            </thead>
            <tbody>
              {row.items.sort((a,b) => b.total - a.total).map((item, i) => (
                <tr key={i} className="border-b border-gray-800/20 hover:bg-gray-800/20">
                  <td className="px-6 py-2 text-gray-300 max-w-xs truncate">{item.name}</td>
                  <td className="px-4 py-2 text-right text-gray-600 font-mono">{item.code || '—'}</td>
                  <td className="px-4 py-2 text-right text-white font-semibold">{num(item.qty,0)}</td>
                  <td className="px-4 py-2 text-right text-gray-400">{money(item.price)}</td>
                  <td className="px-4 py-2 text-right text-emerald-400 font-semibold">{money(item.total)}</td>
                </tr>
              ))}
            </tbody>
            <tfoot>
              <tr className="border-t border-gray-700">
                <td colSpan="2" className="px-6 py-2 text-gray-500 font-semibold">Subtotal {row.vendor}</td>
                <td className="px-4 py-2 text-right text-white font-bold">{num(row.units,0)}</td>
                <td></td>
                <td className="px-4 py-2 text-right text-emerald-400 font-bold">{money(row.amount)}</td>
              </tr>
            </tfoot>
          </table>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════
   STATUS INDICATOR
══════════════════════════════════════════════════════════════ */
function Status() {
  const { data, loading } = useApi('/api/status');
  if (loading) return <span className="text-xs text-gray-500">Conectando…</span>;
  return (
    <div className="flex items-center gap-2 text-xs">
      <span className={`w-2 h-2 rounded-full ${data?.connected ? 'bg-emerald-400 shadow-[0_0_6px_#34d399]' : 'bg-red-500'}`}/>
      <span className={data?.connected ? 'text-emerald-400' : 'text-red-400'}>
        {data?.connected ? `Odoo conectado · ${data.db}` : (data?.message||'Sin conexión')}
      </span>
    </div>
  );
}
