══════════════════════════════════════════════════════════════ */
const TABS = [
  { id:'dashboard', label:'Dashboard',        icon:'📊' },
  { id:'stock',     label:'Alertas de stock', icon:'📦' },
  { id:'forecast',  label:'Pronóstico',        icon:'🔮' },
  { id:'transit',   label:'En tránsito',       icon:'🚢' },
];

/* ══════════════════════════════════════════════════════════════
   TRÁNSITO — pedidos realizados pero no en Odoo aún
══════════════════════════════════════════════════════════════ */
function Transit() {
  const { data: forecastData } = useApi('/api/forecast');
  const [orders,    setOrders]    = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [showForm,  setShowForm]  = useState(false);
  const [expanded,  setExpanded]  = useState({});
  const [form,      setForm]      = useState({ ref:'', supplier:'', order_date: new Date().toISOString().slice(0,10), expected_arrival:'' });
  const [lines,        setLines]        = useState([]);
  const [pSearch,      setPSearch]      = useState('');
  const [editingOrder,    setEditingOrder]    = useState(null);
  const [supplierFilter,  setSupplierFilter]  = useState('all');
  const [sendingOdoo,     setSendingOdoo]     = useState(new Set());
  const [odooResult,      setOdooResult]      = useState(null); // { po_name, error }
  const [containerModal,  setContainerModal]  = useState(null); // { order, lines, containerRef }
  const [archiveModal,    setArchiveModal]    = useState(null); // { order }
  const [archiveDate,     setArchiveDate]     = useState('');
  const [showHistory,     setShowHistory]     = useState(false);
  const [rates,           setRates]           = useState(null);  // { CNY, USD }

  React.useEffect(() => {
    fetch('/api/exchange-rates').then(r=>r.json()).then(setRates).catch(()=>{});
  }, []);

  const activeOrders   = orders.filter(o => (o.status||'active') === 'active');
  const archivedOrders = orders.filter(o => o.status === 'archived');

  const arrivalClass = (dateStr) => {
    if (!dateStr) return 'text-gray-500 bg-gray-800/60 border-gray-700/50';
    const today = new Date().toISOString().slice(0,7);
    const d30   = new Date(Date.now()+30*24*3600*1000).toISOString().slice(0,7);
    const d60   = new Date(Date.now()+60*24*3600*1000).toISOString().slice(0,7);
    if (dateStr < today) return 'text-red-400 bg-red-900/30 border-red-800/50';
    if (dateStr <= d30)  return 'text-orange-400 bg-orange-900/30 border-orange-800/50';
    if (dateStr <= d60)  return 'text-amber-400 bg-amber-900/30 border-amber-800/50';
    return 'text-gray-400 bg-gray-800/40 border-gray-700/50';
  };

  const archiveOrder = async () => {
    if (!archiveModal) return;
    await fetch(`/api/transit/${archiveModal.order.id}/archive`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ actual_arrival: archiveDate }),
    });
    setArchiveModal(null); setArchiveDate('');
    loadOrders();
  };
  const readOnly = useReadOnly();
  const allProducts = forecastData?.products || [];

  // Price lookup: product_id → vendor_price (or avg_price as fallback)
  const priceMap = useMemo(() => {
    const m = {};
    allProducts.forEach(p => { m[p.product_id] = p.vendor_price || p.avg_price || 0; });
    return m;
  }, [allProducts]);

  const suppliers = useMemo(() => {
    const s = new Set(orders.map(o => o.supplier).filter(Boolean));
    return [...s].sort();
  }, [orders]);

  const loadOrders = async () => {
    setLoading(true);
    try {
      const r = await fetch('/api/transit');
      const j = await r.json();
      // Sort by expected_arrival ascending; orders without date go to the end
      const sorted = (j.orders || []).sort((a, b) => {
        if (!a.expected_arrival && !b.expected_arrival) return 0;
        if (!a.expected_arrival) return 1;
        if (!b.expected_arrival) return -1;
        return a.expected_arrival.localeCompare(b.expected_arrival);
      });
      setOrders(sorted);
    } catch(e) {}
    setLoading(false);
  };
  useEffect(() => { loadOrders(); }, []);

  const deleteOrder = async (id) => {
    if (!window.confirm('¿Eliminar este pedido y todas sus líneas?')) return;
    await fetch(`/api/transit/${id}`, { method:'DELETE' });
    loadOrders();
  };
  const deleteLine = async (orderId, lineId) => {
    await fetch(`/api/transit/${orderId}/lines/${lineId}`, { method:'DELETE' });
    loadOrders();
  };
  const addLine = (product) => {
    if (lines.find(l => l.product_id === product.product_id)) return;
    setLines(prev => [...prev, { product_id: product.product_id, product_name: product.product_name, qty: product.suggested_qty || 1, price: priceMap[product.product_id] || 0 }]);
    setPSearch('');
  };
  const openContainerModal = (order) => {
    const lines = order.lines.map(l => ({
      ...l,
      container_qty: l.qty,  // default: all quantity
      price: l.price || priceMap[l.product_id] || 0,
    }));
    setContainerModal({ order, lines, containerRef: order.ref });
  };

  const sendContainer = async () => {
    if (!containerModal) return;
    const { order, lines, containerRef } = containerModal;
    setSendingOdoo(prev => new Set([...prev, order.id]));
    setOdooResult(null);
    setContainerModal(null);
    try {
      const payload = {
        container_ref: containerRef,
        lines: lines
          .filter(l => l.container_qty > 0)
          .map(l => ({ product_id: l.product_id, product_name: l.product_name, qty: l.container_qty, price: l.price })),
      };
      const r = await fetch(`/api/transit/${order.id}/send-to-odoo`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const j = await r.json();
      if (!r.ok) throw new Error(j.detail || 'Error desconocido');
      setOdooResult({ po_name: j.po_name, error: null });
      loadOrders();
    } catch(e) {
      setOdooResult({ po_name: null, error: e.message });
    } finally {
      setSendingOdoo(prev => { const s = new Set(prev); s.delete(order.id); return s; });
    }
  };

  const saveOrder = async () => {
    if (!form.ref || lines.length === 0) return;
    if (editingOrder) {
      await fetch(`/api/transit/${editingOrder.id}`, {
        method:'PATCH',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ...form, lines }),
      });
    } else {
      await fetch('/api/transit', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ...form, lines }),
      });
    }
    resetForm();
    loadOrders();
  };

  // Unique vendors from forecast products for the supplier dropdown
  const vendorOptions = useMemo(() => {
    const vs = new Set(allProducts.map(p => p.vendor).filter(Boolean));
    return [...vs].sort();
  }, [allProducts]);

  const filteredProducts = useMemo(() => {
    if (!pSearch || pSearch.length < 2) return [];
    const byVendor = form.supplier
      ? allProducts.filter(p => p.vendor === form.supplier)
      : allProducts;
    const q = pSearch.toLowerCase();
    return byVendor.filter(p =>
      p.product_name.toLowerCase().includes(q) || (p.old_sku||'').toLowerCase().includes(q)
    ).slice(0, 12);
  }, [allProducts, pSearch, form.supplier]);

  const totalUnits = orders.reduce((a, o) => a + o.lines.reduce((b, l) => b + l.qty, 0), 0);
  const totalLines = orders.reduce((a, o) => a + o.lines.length, 0);

  const resetForm = () => {
    setShowForm(false);
    setEditingOrder(null);
    setLines([]);
    setImportPreview(null);
    setForm({ ref:'', supplier:'', order_date: new Date().toISOString().slice(0,10), expected_arrival:'' });
    setPSearch('');
  };

  const startEdit = (order) => {
    setEditingOrder(order);
    setForm({
      ref:              order.ref || '',
      supplier:         order.supplier || '',
      order_date:       order.order_date || '',
      expected_arrival: order.expected_arrival || '',
    });
    setLines(order.lines.map(l => ({ ...l })));
    setImportPreview(null);
    setShowForm(true);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  // ── Excel export ────────────────────────────────────────────────────────────
  const exportTransitExcel = async () => {
    const XLSX = window.XLSX;
    if (!XLSX) return alert('SheetJS no cargado');

    // Collect all unique product IDs across all orders
    const allPids = [...new Set(orders.flatMap(o => o.lines.map(l => l.product_id).filter(Boolean)))];
    let details = {};
    if (allPids.length > 0) {
      try {
        const r = await fetch(`/api/products/transit-details?ids=${allPids.join(',')}`);
        details = await r.json();
      } catch(e) { /* silently skip if error */ }
    }

    const rows = [['Referencia', 'Proveedor', 'Fecha Pedido', 'Llegada Estimada', 'Producto', 'Old SKU', 'Ref. Proveedor', 'Uds Originales', 'Uds Pendientes']];
    orders.forEach(o => {
      o.lines.forEach((l, i) => {
        const d = details[l.product_id] || {};
        rows.push([
          i === 0 ? o.ref : '',
          i === 0 ? (o.supplier || '') : '',
          i === 0 ? (o.order_date || '') : '',
          i === 0 ? (o.expected_arrival || '') : '',
          l.product_name,
          d.old_sku || '',
          d.vendor_ref || '',
          l.original_qty || l.qty,
          l.qty,
        ]);
      });
      rows.push(['', '', '', '', '', '', '', '', '']);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [20,20,14,16,50,14,16,14,14].map(w => ({ wch: w }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'En tránsito');
    XLSX.writeFile(wb, `transito_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  // ── Excel import ────────────────────────────────────────────────────────────
  const [transitSearch, setTransitSearch] = useState('');
  const [importPreview, setImportPreview] = useState(null); // array of parsed orders
  const [importSaving,  setImportSaving]  = useState(false);

  const importExcel = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const XLSX = window.XLSX;
        const wb   = XLSX.read(ev.target.result, { type:'array' });
        const ws   = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
        // Format: [Referencia, Proveedor, Fecha Pedido, Llegada Estimada, Producto, Old SKU, Ref. Proveedor, Uds Originales, Uds Pendientes]
        // Col 0 only filled on first row of each order; empty rows separate orders
        const parsed = [];
        let cur = null;
        rows.slice(1).forEach(r => {
          const ref         = String(r[0] || '').trim();
          const supplier    = String(r[1] || '').trim();
          const orderDate   = String(r[2] || '').trim();
          const arrival     = String(r[3] || '').trim();
          const productName = String(r[4] || '').trim();
          const oldSku      = String(r[5] || '').trim();
          const qty         = parseFloat(String(r[7] || '0').replace(',','.')) || 0;
          if (!productName) return; // empty separator row
          if (ref) { // new order block
            cur = { ref, supplier, order_date: orderDate, expected_arrival: arrival, lines: [] };
            parsed.push(cur);
          }
          if (!cur || qty <= 0) return;
          const found = allProducts.find(p =>
            p.product_name === productName ||
            (oldSku && p.old_sku && p.old_sku.toLowerCase() === oldSku.toLowerCase())
          );
          cur.lines.push({
            product_id:   found?.product_id || null,
            product_name: productName,
            qty,
            price:        found ? (found.vendor_price || found.avg_price || 0) : 0,
            matched:      !!found,
          });
        });
        const valid = parsed.filter(o => o.lines.length > 0);
        if (valid.length === 0) return alert('No se encontraron pedidos con productos en el Excel.\nVerifica que el formato es el del Excel exportado desde esta misma web.');
        setImportPreview(valid);
      } catch(err) {
        alert('Error leyendo el Excel: ' + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
    e.target.value = '';
  };

  const confirmImport = async () => {
    if (!importPreview?.length) return;
    setImportSaving(true);
    try {
      for (const order of importPreview) {
        const linesToSave = order.lines.filter(l => l.product_id && l.qty > 0);
        if (linesToSave.length === 0) continue;
        const res = await fetch('/api/transit', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ref: order.ref, supplier: order.supplier, order_date: order.order_date, expected_arrival: order.expected_arrival, lines: linesToSave }),
        });
        if (!res.ok) { alert(`Error creando "${order.ref}": ${await res.text()}`); break; }
      }
      setImportPreview(null);
      loadOrders();
    } catch(e) { alert('Error de red: ' + e.message); }
    setImportSaving(false);
  };

  /* ── Import preview modal ─────────────────────────────────────────── */
  if (importPreview) {
    const totalOrders   = importPreview.length;
    const totalProducts = importPreview.reduce((a,o) => a + o.lines.filter(l=>l.matched).length, 0);
    const totalUnmatched= importPreview.reduce((a,o) => a + o.lines.filter(l=>!l.matched).length, 0);
    return (
      <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4">
        <div className="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-2xl max-h-[90vh] flex flex-col shadow-2xl">
          <div className="px-6 py-4 border-b border-gray-800 flex items-center justify-between shrink-0">
            <div>
              <h3 className="text-white font-bold">📥 Vista previa de importación</h3>
              <p className="text-xs text-gray-500 mt-0.5">
                {totalOrders} pedido{totalOrders!==1?'s':''} · {totalProducts} producto{totalProducts!==1?'s':''} identificado{totalProducts!==1?'s':''}
                {totalUnmatched > 0 && <span className="text-amber-400 ml-2">· ⚠️ {totalUnmatched} sin identificar (se omitirán)</span>}
              </p>
            </div>
            <button onClick={() => setImportPreview(null)} className="text-gray-500 hover:text-white text-xl leading-none">×</button>
          </div>
          <div className="overflow-y-auto flex-1 px-6 py-4 space-y-4">
            {importPreview.map((order, oi) => (
              <div key={oi} className="bg-gray-800/50 border border-gray-700/50 rounded-xl p-3">
                <div className="flex items-center gap-3 mb-2">
                  <span className="text-sm font-semibold text-white">{order.ref}</span>
                  {order.supplier && <span className="text-xs text-gray-400">{order.supplier}</span>}
                  {order.order_date && <span className="text-xs text-gray-600">{order.order_date}</span>}
                  {order.expected_arrival && <span className="text-xs text-amber-500">🚢 {order.expected_arrival}</span>}
                </div>
                <table className="w-full text-xs">
                  <tbody>
                    {order.lines.map((line, li) => (
                      <tr key={li} className={`border-b border-gray-700/30 ${!line.matched ? 'opacity-40' : ''}`}>
                        <td className="py-1 pr-3 text-gray-300 truncate max-w-xs" title={line.product_name}>
                          {!line.matched && <span className="text-amber-500 mr-1" title="Producto no encontrado">⚠️</span>}
                          {line.product_name}
                        </td>
                        <td className="py-1 text-right text-emerald-300 font-semibold w-20">{num(line.qty,0)} uds</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            ))}
          </div>
          <div className="px-6 py-4 border-t border-gray-800 flex gap-3 justify-end shrink-0">
            <button onClick={() => setImportPreview(null)} className="px-4 py-2 rounded-lg text-sm bg-gray-800 border border-gray-700 text-gray-300 hover:bg-gray-700">Cancelar</button>
            <button onClick={confirmImport} disabled={importSaving || totalProducts === 0}
              className="px-4 py-2 rounded-lg text-sm bg-emerald-600 hover:bg-emerald-500 disabled:opacity-40 text-white font-semibold">
              {importSaving ? '⏳ Importando...' : `✅ Importar ${totalOrders} pedido${totalOrders!==1?'s':''}`}
            </button>
          </div>
        </div>
      </div>
    );
  }

  /* ── Container modal ──────────────────────────────────────────────── */
  if (containerModal) {
    const { order: mo, lines: ml, containerRef: mcr } = containerModal;
    const totalValue = ml.reduce((a, l) => a + l.container_qty * (l.price || 0), 0);
    return (
      <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4">
        <div className="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-2xl max-h-[90vh] flex flex-col shadow-2xl">
          <div className="px-6 py-4 border-b border-gray-800 flex items-center justify-between">
            <div>
              <h3 className="text-white font-bold text-base">📦 Nuevo contenedor → Odoo</h3>
              <p className="text-xs text-gray-500 mt-0.5">Pedido: <span className="text-gray-300">{mo.ref}</span> · {mo.supplier}</p>
            </div>
            <button onClick={() => setContainerModal(null)} className="text-gray-500 hover:text-white text-xl">×</button>
          </div>

          <div className="px-6 py-3 border-b border-gray-800">
            <label className="text-xs text-gray-400 block mb-1">Referencia de este contenedor</label>
            <input value={containerModal.containerRef}
              onChange={e => setContainerModal(m => ({...m, containerRef: e.target.value}))}
              placeholder={mo.ref}
              className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:border-purple-500 outline-none" />
          </div>

          <div className="overflow-auto flex-1">
            <table className="w-full text-xs">
              <thead className="sticky top-0 bg-gray-900 border-b border-gray-800">
                <tr>
                  <th className="px-4 py-2 text-left text-gray-400 font-medium">Producto</th>
                  <th className="px-4 py-2 text-right text-gray-400 font-medium">Total pedido</th>
                  <th className="px-4 py-2 text-right text-gray-400 font-medium">Precio u.</th>
                  <th className="px-4 py-2 text-right text-gray-400 font-medium w-32">En este contenedor</th>
                  <th className="px-4 py-2 text-right text-gray-400 font-medium">Subtotal</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-gray-800/50">
                {ml.map((line, i) => (
                  <tr key={line.product_id} className="hover:bg-gray-800/20">
                    <td className="px-4 py-2.5 text-gray-200">{line.product_name}</td>
                    <td className="px-4 py-2.5 text-right text-gray-500">{num(line.qty, 0)}</td>
                    <td className="px-4 py-2.5 text-right text-gray-400">{line.price ? money(line.price) : '—'}</td>
                    <td className="px-4 py-2.5 text-right">
                      <input type="number" min="0" max={line.qty} step="1"
                        value={line.container_qty}
                        onChange={e => {
                          const raw = parseFloat(e.target.value) || 0;
                          const clamped = Math.min(Math.max(raw, 0), line.qty);
                          setContainerModal(m => ({
                            ...m,
                            lines: m.lines.map((l, j) => j === i ? {...l, container_qty: clamped} : l)
                          }));
                        }}
                        className={`w-24 bg-gray-800 border rounded px-2 py-1 text-right text-white focus:border-purple-500 outline-none ${line.container_qty > line.qty ? 'border-red-500' : 'border-gray-700'}`} />
                    <span className="text-gray-600 text-xs ml-1">/ {num(line.qty,0)}</span>
                    </td>
                    <td className="px-4 py-2.5 text-right text-emerald-400 font-semibold">
                      {line.price && line.container_qty > 0 ? money(line.container_qty * line.price) : '—'}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          <div className="px-6 py-4 border-t border-gray-800 flex items-center justify-between">
            <div className="text-sm text-gray-400">
              Total contenedor: <span className="text-emerald-400 font-bold">{totalValue > 0 ? money(totalValue) : '—'}</span>
            </div>
            <div className="flex gap-3">
              <button onClick={() => setContainerModal(null)}
                className="px-4 py-2 rounded-lg text-sm bg-gray-800 border border-gray-700 text-gray-300 hover:bg-gray-700 transition-colors">
                Cancelar
              </button>
              <button onClick={sendContainer}
                disabled={ml.every(l => l.container_qty === 0)}
                className="px-4 py-2 rounded-lg text-sm bg-purple-700 hover:bg-purple-600 disabled:opacity-40 text-white font-semibold transition-colors flex items-center gap-2">
                📤 Crear GCPO en Odoo
              </button>
            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="fade space-y-4">
      {/* Odoo send result banner */}
      {odooResult && (
        <div className={`rounded-xl px-4 py-3 flex items-center justify-between gap-3 text-sm font-medium ${odooResult.error ? 'bg-red-900/40 border border-red-700/50 text-red-300' : 'bg-emerald-900/40 border border-emerald-700/50 text-emerald-300'}`}>
          <span>{odooResult.error ? `❌ Error: ${odooResult.error}` : `✅ Borrador creado en Odoo: ${odooResult.po_name}`}</span>
          <button onClick={() => setOdooResult(null)} className="text-gray-400 hover:text-white text-lg leading-none">×</button>
        </div>
      )}
      {/* Header */}
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div>
          <h2 className="text-lg font-bold text-white">🚢 Pedidos en tránsito</h2>
          <p className="text-xs text-gray-500 mt-0.5">
            Pedidos ya realizados pero pendientes de entrar en Odoo
            {orders.length > 0 && (() => {
              const totalVal = orders.reduce((a,o) => a + o.lines.reduce((b,l) => b + l.qty*(priceMap[l.product_id]||0), 0), 0);
              return ` · ${orders.length} pedido${orders.length>1?'s':''} · ${num(totalLines,0)} referencias · ${num(totalUnits,0)} uds · ${totalVal > 0 ? money(totalVal) : ''}`;
            })()}
          </p>
        </div>
        <div className="flex items-center gap-2">
          {orders.length > 0 && (
            <button onClick={exportTransitExcel}
              className="px-4 py-2 rounded-lg text-sm bg-gray-700 hover:bg-gray-600 text-gray-200 font-semibold transition-colors flex items-center gap-1.5">
              📤 Exportar Excel
            </button>
          )}
          {!readOnly && <>
            <label className={`px-4 py-2 rounded-lg text-sm bg-emerald-700 hover:bg-emerald-600 text-white font-semibold transition-colors cursor-pointer ${showForm ? 'opacity-40 pointer-events-none' : ''}`}
              title="Importa el Excel del Pronóstico con la columna 'Cantidad a comprar' rellena">
              📥 Importar Excel
              <input type="file" accept=".xlsx,.xls" className="hidden" onChange={importExcel} />
            </label>
            <button onClick={() => { setImportPreview(null); setShowForm(true); }} disabled={showForm}
              className="px-4 py-2 rounded-lg text-sm bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 text-white font-semibold transition-colors">
              + Nuevo pedido
            </button>

          {lines.length > 0 && (

                <thead>
                  <tr className="border-b border-gray-700">
                    <th className="px-3 py-2 text-left text-gray-400 font-medium">Producto</th>
                    <th className="px-3 py-2 text-right text-gray-400 font-medium w-32">Cantidad (uds)</th>
                    <th className="px-3 py-2 w-8"></th>

                      <td className="px-3 py-2 text-gray-200">{l.product_name}</td>
                      <td className="px-3 py-2">

                        <button onClick={() => setLines(prev => prev.filter(x => x.product_id !== l.product_id))}

            const now2 = new Date();
            const hz2  = new Date(now2.getFullYear(), now2.getMonth() + 5, 1);

            return visibleOrders.map(order => {
            const isOpen  = q ? true : !!expanded[order.id];
            const totalQty     = order.lines.reduce((a, l) => a + l.qty, 0);
            const totalOrigQty = order.lines.reduce((a, l) => a + (l.original_qty || l.qty), 0);
            const hasPartial   = totalOrigQty > totalQty;
            const totalValue   = order.lines.reduce((a, l) => a + l.qty * (priceMap[l.product_id] || 0), 0);
            const matchingLines = q ? order.lines.filter(l => l.product_name.toLowerCase().includes(q)) : null;
            const countsInForecast = !order.expected_arrival || order.expected_arrival < horizonStr2;
            return (
              <div key={order.id} className="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden fade">
                {/* Order header */}
                <div className="px-4 py-3 flex items-center gap-3 cursor-pointer hover:bg-gray-800/30 transition-colors"

                  <div className="flex-1 min-w-0">

                        <span className={`text-xs px-2 py-0.5 rounded border ${arrivalClass(order.expected_arrival)}`}>

                        ? <span className="text-xs text-emerald-400 bg-emerald-900/30 border border-emerald-800/50 px-2 py-0.5 rounded" title="Este pedido llega dentro del horizonte de 5 meses y reduce la cantidad sugerida">✓ Cuenta en pronóstico</span>

                      }

                    <p className="text-xs text-gray-500 mt-0.5">

                                if (!window.confirm(`¿Desvincular ${po} y restaurar sus cantidades?`)) return;

                                loadOrders();
                              }}
                              title={`Desvincular solo ${po}`}
                              className="px-1.5 py-1 rounded-r text-xs bg-emerald-900/20 border border-l-0 border-emerald-700/50 text-gray-500 hover:text-red-400 hover:border-red-700 transition-colors">
                              ×
                            </button>
                          </span>
                        ))}
                        <button onClick={e => { e.stopPropagation(); openContainerModal(order); }}
                          disabled={sendingOdoo.has(order.id) || showForm}
                          title="Añadir otro contenedor"
                          className="px-2 py-1 rounded text-xs bg-purple-900/30 border border-purple-700/50 text-purple-400 hover:bg-purple-900/60 disabled:opacity-40 transition-colors">
                          {sendingOdoo.has(order.id) ? '⏳' : '+ contenedor'}
                        </button>
                        <button onClick={async e => {
                            e.stopPropagation();
                            if (!window.confirm('¿Borrar TODOS los vínculos a Odoo y restaurar cantidades originales?')) return;
                            await fetch(`/api/transit/${order.id}/odoo-link`, { method: 'DELETE' });
                            loadOrders();
                          }}
                          title="Desvincular todas las OC"
                          className="px-2 py-1 rounded text-xs bg-gray-800 border border-gray-700 text-gray-500 hover:text-red-400 hover:border-red-700 transition-colors text-xs">
                          🗑 Todo
                        </button>
                      </span>
                    ) : (
                      <button onClick={e => { e.stopPropagation(); openContainerModal(order); }}
                        disabled={sendingOdoo.has(order.id) || showForm}
                        title="Crear GCPO en Odoo (selecciona cantidades por contenedor)"
                        className="px-3 py-1.5 rounded-lg text-xs bg-purple-900/30 border border-purple-700/50 text-purple-400 hover:bg-purple-900/60 disabled:opacity-40 transition-colors flex items-center gap-1">
                        {sendingOdoo.has(order.id) ? '⏳' : '📤'} Odoo
                      </button>
                    )}
                    <button onClick={e => { e.stopPropagation(); startEdit(order); }}
                      disabled={showForm || !!order.odoo_po}

                      className="px-3 py-1.5 rounded-lg text-xs bg-indigo-900/30 border border-indigo-700/50 text-indigo-400 hover:bg-indigo-900/60 disabled:opacity-40 disabled:cursor-not-allowed transition-colors flex items-center gap-1">
                      ✏️ Editar
                    </button>
                    {order.odoo_po ? (
                      <button onClick={e => { e.stopPropagation(); setArchiveDate(''); setArchiveModal({order}); }}
                        className="px-3 py-1.5 rounded-lg text-xs bg-gray-800 border border-gray-700 text-gray-400 hover:bg-gray-700 transition-colors flex items-center gap-1">
                        ✅ Archivar
                      </button>
                    ) : (
                      <button onClick={e => { e.stopPropagation(); deleteOrder(order.id); }}
                        className="px-3 py-1.5 rounded-lg text-xs bg-red-900/30 border border-red-800/50 text-red-400 hover:bg-red-900/60 transition-colors flex items-center gap-1">
                        🗑️ Eliminar
                      </button>
                    )}
                  </div>
                  )}
                </div>

                {/* Lines */}
                {isOpen && (
                  <div className="border-t border-gray-800 fade">

                          <th className="px-4 py-2 text-left text-gray-400 font-medium">Producto</th>
                          <th className="px-4 py-2 text-right text-gray-400 font-medium">Original</th>
                          <th className="px-4 py-2 text-right text-gray-400 font-medium">Pendiente</th>
                          <th className="px-4 py-2 text-right text-gray-400 font-medium">Precio u.</th>
                          <th className="px-4 py-2 text-right text-gray-400 font-medium">Subtotal</th>

                        </tr>
                      </thead>
                      <tbody className="divide-y divide-gray-800/50">
                        {order.lines.map(line => {
                          const isMatch = matchingLines && matchingLines.some(l => l.id === line.id);
                          const dimmed  = matchingLines && !isMatch;
                          const fullyShipped = line.qty === 0;
                          const origQty = line.original_qty || line.qty;
                          return (
                            <tr key={line.id} className={`transition-colors ${dimmed ? 'opacity-25' : fullyShipped ? 'opacity-40' : 'hover:bg-gray-800/20'} ${isMatch ? 'bg-indigo-950/40' : ''}`}>

                                {fullyShipped && <span className="text-emerald-500 mr-1">✓</span>}
                                {line.product_name}

                              <td className="px-4 py-2.5 text-right text-gray-500">{num(origQty,0)}</td>

                                {fullyShipped
                                  ? <span className="text-emerald-500">Enviado</span>
                                  : <span className="text-amber-400">🚢 +{num(line.qty,0)}</span>}
                              </td>
                              <td className="px-4 py-2.5 text-right text-xs text-gray-400">
                                {priceMap[line.product_id] ? <>
                                  {rates?.USD && <div className="text-white font-medium">${num(priceMap[line.product_id]*rates.USD,2)}</div>}
                                  <div className="text-gray-500">{money(priceMap[line.product_id])}</div>
                                </> : '—'}
                              </td>
                              <td className="px-4 py-2.5 text-right text-xs font-semibold text-emerald-400">{priceMap[line.product_id] ? money(line.qty * priceMap[line.product_id]) : '—'}</td>
                              {!readOnly && (
                              <td className="px-4 py-2.5 text-center">
                                <button onClick={() => deleteLine(order.id, line.id)}
                                  className="text-gray-600 hover:text-red-400 transition-colors px-1">✕</button>
                              </td>
                              )}
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                )}
              </div>
            );
          });
          })()}
        </div>
      )}

      {/* ── Historial de pedidos archivados ──────────────────────────── */}
      {archivedOrders.length > 0 && (
        <div className="bg-gray-900/50 border border-gray-800/50 rounded-xl overflow-hidden">
          <button onClick={() => setShowHistory(h => !h)}
            className="w-full px-4 py-3 flex items-center justify-between hover:bg-gray-800/20 transition-colors">
            <span className="text-sm font-semibold text-gray-400">📁 Historial de pedidos recibidos ({archivedOrders.length})</span>
            <span className="text-gray-600 text-xs">{showHistory ? '▲ ocultar' : '▼ mostrar'}</span>
          </button>
          {showHistory && (
            <div className="border-t border-gray-800/50 divide-y divide-gray-800/30">
              {archivedOrders.map(order => {
                const delay = order.expected_arrival && order.actual_arrival
                  ? Math.round((new Date(order.actual_arrival+'-01') - new Date(order.expected_arrival+'-01')) / (30*24*3600*1000))
                  : null;
                return (
                  <div key={order.id} className="px-4 py-3 flex items-center justify-between gap-4 opacity-70 hover:opacity-100 transition-opacity">
                    <div className="flex-1 min-w-0">
                      <div className="flex items-center gap-2 flex-wrap">
                        <span className="text-sm font-bold text-gray-300">{order.ref}</span>
                        {order.supplier && <span className="text-xs text-gray-500">{order.supplier}</span>}
                        {order.odoo_po && order.odoo_po.split(',').map(po => po.trim()).filter(Boolean).map(po => (
                          <span key={po} className="text-xs text-emerald-600 border border-emerald-900 px-1.5 py-0.5 rounded">✅ {po}</span>
                        ))}
                      </div>
                      <div className="flex items-center gap-3 mt-1 text-xs text-gray-600">
                        {order.expected_arrival && <span>📅 Estimada: {order.expected_arrival}</span>}
                        {order.actual_arrival && <span>✅ Real: {order.actual_arrival}</span>}
                        {delay !== null && (
                          <span className={delay <= 0 ? 'text-emerald-600' : 'text-red-500'}>
                            {delay <= 0 ? `⚡ ${Math.abs(delay)}m antes` : `⚠️ ${delay}m de retraso`}
                          </span>
                        )}
                      </div>
                    </div>
                    {!readOnly && (
                      <button onClick={async () => { await fetch(`/api/transit/${order.id}/unarchive`,{method:'PATCH'}); loadOrders(); }}
                        title="Restaurar a activo"
                        className="px-2 py-1 rounded text-xs bg-gray-800 border border-gray-700 text-gray-500 hover:text-white transition-colors shrink-0">
                        ↩ Restaurar
                      </button>
                    )}
                  </div>
                );
              })}
              {/* Supplier performance summary */}
              {(() => {
                const perf = {};
                archivedOrders.filter(o => o.expected_arrival && o.actual_arrival).forEach(o => {
                  const delay = Math.round((new Date(o.actual_arrival+'-01') - new Date(o.expected_arrival+'-01')) / (30*24*3600*1000));
                  const s = o.supplier || 'Desconocido';
                  if (!perf[s]) perf[s] = { count:0, totalDelay:0 };
                  perf[s].count++; perf[s].totalDelay += delay;
                });
                const entries = Object.entries(perf);
                if (entries.length === 0) return null;
                return (
                  <div className="px-4 py-3 border-t border-gray-800/50 bg-gray-800/20">
                    <p className="text-xs text-gray-500 font-medium mb-2">📊 Rendimiento de proveedores</p>
                    <div className="flex flex-wrap gap-3">
                      {entries.map(([supplier, d]) => {
                        const avg = d.totalDelay / d.count;
                        return (
                          <div key={supplier} className="text-xs">
                            <span className="text-gray-400">{supplier.split(' ')[0]}</span>
                            <span className={`ml-1 font-semibold ${avg <= 0 ? 'text-emerald-400' : avg <= 1 ? 'text-amber-400' : 'text-red-400'}`}>
                              {avg <= 0 ? `⚡ ${Math.abs(avg).toFixed(1)}m antes` : `⚠️ +${avg.toFixed(1)}m`}
                            </span>
                            <span className="text-gray-600 ml-1">({d.count} pedidos)</span>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })()}
            </div>
          )}
        </div>
      )}

      {/* ── Archive modal ─────────────────────────────────────────────── */}
      {archiveModal && (
        <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4">
          <div className="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-sm shadow-2xl">
            <div className="px-6 py-4 border-b border-gray-800">
              <h3 className="text-white font-bold">✅ Archivar pedido</h3>
              <p className="text-xs text-gray-500 mt-0.5">{archiveModal.order.ref} · {archiveModal.order.supplier}</p>
            </div>
            <div className="px-6 py-4 space-y-3">
              <p className="text-xs text-gray-400">¿Cuándo llegó realmente la mercancía?</p>
              <div>
                <label className="text-xs text-gray-400 block mb-1">Fecha real de llegada</label>
                <input type="month" value={archiveDate} onChange={e => setArchiveDate(e.target.value)}
                  className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:border-emerald-500 outline-none" />
              </div>
              {archiveDate && archiveModal.order.expected_arrival && (() => {
                const d = Math.round((new Date(archiveDate+'-01') - new Date(archiveModal.order.expected_arrival+'-01')) / (30*24*3600*1000));
                return <p className={`text-xs font-medium ${d <= 0 ? 'text-emerald-400' : 'text-red-400'}`}>
                  {d <= 0 ? `⚡ Llegó ${Math.abs(d)} mes(es) antes de lo previsto` : `⚠️ Llegó con ${d} mes(es) de retraso`}
                </p>;
              })()}
            </div>
            <div className="px-6 py-4 border-t border-gray-800 flex gap-3 justify-end">
              <button onClick={() => setArchiveModal(null)} className="px-4 py-2 rounded-lg text-sm bg-gray-800 border border-gray-700 text-gray-300 hover:bg-gray-700">Cancelar</button>
              <button onClick={archiveOrder}
                className="px-4 py-2 rounded-lg text-sm bg-emerald-700 hover:bg-emerald-600 text-white font-semibold">
                ✅ Archivar
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function UrgentBadge() {
  const { data } = useApi('/api/forecast');
  if (!data?.products) return null;
  const n = data.products.filter(p => p.coverage_months < 5 && p.coverage_months > -99).length;
  if (n === 0) return null;
  return (
    <span className="ml-1 px-1.5 py-0.5 rounded-full text-xs font-bold bg-red-600 text-white leading-none">
      {n}
    </span>
  );
}

function App() {
  const [tab, setTab] = useState('dashboard');
  const [dark, setDark] = useState(() => localStorage.getItem('theme') !== 'light');

  useEffect(() => {
    const html = document.documentElement;
    if (dark) { html.classList.remove('light'); html.classList.add('dark'); }
    else       { html.classList.remove('dark');  html.classList.add('light'); }
    localStorage.setItem('theme', dark ? 'dark' : 'light');
  }, [dark]);

  const bg      = dark ? '#030712' : '#f1f5f9';
  const panelBg = dark ? '#0f172a' : '#ffffff';

  return (
    <ThemeCtx.Provider value={dark}>
    <ReadOnlyCtx.Provider value={IS_READONLY}>
    <div className="min-h-screen flex flex-col" style={{background: bg}}>
      {/* Read-only banner */}
      {IS_READONLY && (
        <div className="bg-amber-600/90 text-amber-950 text-xs font-semibold text-center py-1.5 px-4">
          👁️ Modo solo lectura — vista de consulta
        </div>
      )}
      {/* Header */}
      <header className="border-b border-gray-800 px-5 py-3 flex items-center justify-between sticky top-0 z-10"
        style={{background: panelBg}}>
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 rounded-lg bg-indigo-600 flex items-center justify-center text-lg">🛒</div>
          <div>
            <p className="text-sm font-bold text-white leading-tight">Odoo Purchasing Intelligence</p>
            <p className="text-xs text-gray-500 leading-tight">v16 · Análisis de compras</p>
          </div>
        </div>
        <div className="flex items-center gap-3">
          <button
            onClick={() => setDark(d => !d)}
            title={dark ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'}
            className="w-8 h-8 rounded-lg flex items-center justify-center text-base transition-colors hover:bg-gray-800 text-gray-400 hover:text-gray-200">
            {dark ? '☀️' : '🌙'}
          </button>
          <Status />
        </div>
      </header>

      {/* Tabs */}
      <nav className="border-b border-gray-800 px-5 flex gap-1" style={{background: panelBg}}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            className={`px-4 py-3 text-sm font-medium flex items-center gap-1.5 border-b-2 transition-colors
              ${tab===t.id ? 'border-indigo-500 text-white' : 'border-transparent text-gray-400 hover:text-gray-200'}`}>
            {t.icon} {t.label}
            {t.id === 'forecast' && <UrgentBadge />}
          </button>
        ))}
      </nav>

      {/* Content */}
      <main className="flex-1 p-4 md:p-6 overflow-auto">
        {tab==='dashboard' && <Dashboard />}
        {tab==='stock'     && <StockAlerts />}
        {tab==='forecast'  && <Forecast />}
        {tab==='transit'   && <Transit />}
      </main>
    </div>
    </ReadOnlyCtx.Provider>
    </ThemeCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
