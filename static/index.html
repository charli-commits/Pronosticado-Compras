<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Odoo Purchasing Intelligence</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.24.7/babel.min.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #030712; color: #f1f5f9; transition: background .2s, color .2s; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #111827; }
    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 3px; }
    .fade { animation: fadeUp .25s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:none } }
    .sk { background: linear-gradient(90deg,#1f2937 25%,#374151 50%,#1f2937 75%);
          background-size:200% 100%; animation:sk 1.4s infinite; border-radius:6px; }
    @keyframes sk { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* ── Light mode ── */
    html.light body { background:#f1f5f9; color:#0f172a; }
    html.light ::-webkit-scrollbar-track { background:#e2e8f0; }
    html.light ::-webkit-scrollbar-thumb { background:#94a3b8; }
    html.light .sk { background:linear-gradient(90deg,#e2e8f0 25%,#f8fafc 50%,#e2e8f0 75%); background-size:200% 100%; }
    /* backgrounds */
    html.light .bg-gray-950 { background-color:#e2e8f0 !important; }
    html.light .bg-gray-900 { background-color:#ffffff !important; }
    html.light .bg-gray-800 { background-color:#f1f5f9 !important; }
    html.light .bg-gray-700 { background-color:#e2e8f0 !important; }
    html.light .bg-gray-600 { background-color:#cbd5e1 !important; }
    html.light .bg-gray-950\/50 { background-color:rgba(226,232,240,.5) !important; }
    html.light .bg-gray-900\/80 { background-color:rgba(255,255,255,.8) !important; }
    html.light .bg-gray-900\/70 { background-color:rgba(255,255,255,.7) !important; }
    html.light .bg-gray-800\/60 { background-color:rgba(241,245,249,.6) !important; }
    html.light .bg-gray-800\/50 { background-color:rgba(241,245,249,.5) !important; }
    html.light .bg-gray-800\/40 { background-color:rgba(241,245,249,.4) !important; }
    html.light .bg-gray-800\/30 { background-color:rgba(241,245,249,.3) !important; }
    html.light .bg-gray-800\/20 { background-color:rgba(241,245,249,.2) !important; }
    html.light .bg-gray-700\/60 { background-color:rgba(226,232,240,.6) !important; }
    html.light .bg-gray-700\/40 { background-color:rgba(226,232,240,.4) !important; }
    /* text */
    html.light .text-white    { color:#0f172a !important; }
    html.light .text-gray-100 { color:#1e293b !important; }
    html.light .text-gray-200 { color:#1e293b !important; }
    html.light .text-gray-300 { color:#334155 !important; }
    html.light .text-gray-400 { color:#475569 !important; }
    html.light .text-gray-500 { color:#64748b !important; }
    html.light .text-gray-600 { color:#94a3b8 !important; }
    /* borders */
    html.light .border-gray-800    { border-color:#e2e8f0 !important; }
    html.light .border-gray-800\/40{ border-color:rgba(226,232,240,.4) !important; }
    html.light .border-gray-800\/20{ border-color:rgba(226,232,240,.2) !important; }
    html.light .border-gray-700    { border-color:#cbd5e1 !important; }
    html.light .border-gray-700\/80{ border-color:rgba(203,213,225,.8) !important; }
    html.light .border-gray-700\/60{ border-color:rgba(203,213,225,.6) !important; }
    html.light .border-gray-700\/50{ border-color:rgba(203,213,225,.5) !important; }
    html.light .border-gray-600    { border-color:#94a3b8 !important; }
    /* dividers */
    html.light .divide-gray-800 > * + * { border-color:#e2e8f0 !important; }
    html.light .divide-gray-800\/60 > * + * { border-color:rgba(226,232,240,.6) !important; }
    html.light .divide-gray-800\/50 > * + * { border-color:rgba(226,232,240,.5) !important; }
    html.light .divide-gray-700\/50 > * + * { border-color:rgba(203,213,225,.5) !important; }
    /* hover */
    html.light .hover\:bg-gray-800:hover { background-color:#f1f5f9 !important; }
    html.light .hover\:bg-gray-700:hover { background-color:#e2e8f0 !important; }
    html.light .hover\:bg-gray-800\/40:hover { background-color:rgba(241,245,249,.4) !important; }
    /* KPI gradient cards in light mode */
    html.light .from-indigo-900\/50  { --tw-gradient-from:rgba(238,242,255,.6); }
    html.light .to-indigo-800\/20    { --tw-gradient-to:rgba(224,231,255,.3); }
    html.light .border-indigo-700\/30{ border-color:rgba(165,180,252,.4) !important; }
    html.light .from-cyan-900\/50    { --tw-gradient-from:rgba(236,254,255,.6); }
    html.light .to-cyan-800\/20      { --tw-gradient-to:rgba(207,250,254,.3); }
    html.light .border-cyan-700\/30  { border-color:rgba(103,232,249,.4) !important; }
    html.light .from-emerald-900\/50 { --tw-gradient-from:rgba(236,253,245,.6); }
    html.light .to-emerald-800\/20   { --tw-gradient-to:rgba(209,250,229,.3); }
    html.light .border-emerald-700\/30{ border-color:rgba(52,211,153,.4) !important; }
    html.light .from-amber-900\/50   { --tw-gradient-from:rgba(255,251,235,.6); }
    html.light .to-amber-800\/20     { --tw-gradient-to:rgba(254,243,199,.3); }
    html.light .border-amber-700\/30 { border-color:rgba(251,191,36,.4) !important; }
    html.light .from-rose-900\/50    { --tw-gradient-from:rgba(255,241,242,.6); }
    html.light .to-rose-800\/20      { --tw-gradient-to:rgba(255,228,230,.3); }
    html.light .border-rose-700\/30  { border-color:rgba(251,113,133,.4) !important; }
    html.light .from-violet-900\/50  { --tw-gradient-from:rgba(245,243,255,.6); }
    html.light .to-violet-800\/20    { --tw-gradient-to:rgba(237,233,254,.3); }
    html.light .border-violet-700\/30{ border-color:rgba(167,139,250,.4) !important; }
    /* inputs & selects */
    html.light input, html.light select, html.light textarea {
      background-color:#ffffff !important; color:#0f172a !important;
      border-color:#cbd5e1 !important;
    }
    html.light input::placeholder { color:#94a3b8 !important; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ── utils ── */
const money = (n) => new Intl.NumberFormat('es-ES',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n||0);
const num   = (n,d=0) => new Intl.NumberFormat('es-ES',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n||0);

const STATE = {
  draft:    { label:'Borrador',   cls:'bg-gray-600 text-gray-100' },
  sent:     { label:'Enviada',    cls:'bg-blue-600 text-blue-100' },
  purchase: { label:'Confirmada', cls:'bg-emerald-600 text-emerald-100' },
  done:     { label:'Hecho',      cls:'bg-teal-700 text-teal-100' },
  cancel:   { label:'Cancelada',  cls:'bg-red-700 text-red-100' },
};
const SEV = {
  critical: { icon:'🔴', label:'Sin stock',        bar:'bg-red-500',    txt:'text-red-400'     },
  warning:  { icon:'🟠', label:'Bajo mínimo',      bar:'bg-orange-500', txt:'text-orange-400'  },
  info:     { icon:'🟡', label:'Cerca del mínimo', bar:'bg-yellow-400', txt:'text-yellow-400'  },
  ok:       { icon:'🟢', label:'OK',               bar:'bg-emerald-500',txt:'text-emerald-400' },
};
const TREND = {
  up:     { icon:'📈', label:'Creciente',  cls:'text-emerald-400' },
  down:   { icon:'📉', label:'Decreciente',cls:'text-red-400'     },
  stable: { icon:'➡️', label:'Estable',   cls:'text-blue-400'    },
};
const COLORS = ['#6366f1','#22d3ee','#a3e635','#f97316','#ec4899','#facc15','#34d399','#818cf8','#fb7185','#38bdf8'];

/* ── Theme ── */
const ThemeCtx = React.createContext(true); // true = dark (default)
const useTheme = () => React.useContext(ThemeCtx);

/* ── Read-only mode ── */
const ReadOnlyCtx = React.createContext(false);
const useReadOnly = () => React.useContext(ReadOnlyCtx);
const IS_READONLY = window.location.pathname.startsWith('/view/');

/* ── Auth context ── */
const AuthCtx = React.createContext({ role: 'admin', logout: () => {} });
const useAuth = () => React.useContext(AuthCtx);

/* ── Authenticated fetch ── */
function apiFetch(url, options = {}) {
  const token    = localStorage.getItem('auth_token');
  const viewPath = window.location.pathname;
  const headers  = { ...(options.headers || {}) };
  if (token) {
    headers['Authorization'] = `Bearer ${token}`;
  } else if (IS_READONLY) {
    // For view-only links: pass the share token so the backend recognises it
    const viewToken = viewPath.split('/view/')[1];
    if (viewToken) headers['X-View-Token'] = viewToken;
  }
  return fetch(url, { ...options, headers }).then(r => {
    if (r.status === 401) {
      localStorage.removeItem('auth_token');
      localStorage.removeItem('auth_role');
      window.location.reload();
    }
    return r;
  });
}

/* ── API hook ── */
function useApi(url) {
  const [data,   setData]    = useState(null);
  const [loading,setLoading] = useState(false);
  const [error,  setError]   = useState(null);
  const load = useCallback(async () => {
    setLoading(true); setError(null);
    try {
      const r = await apiFetch(url);
      const j = await r.json();
      if (!r.ok) throw new Error(j.detail || r.statusText);
      setData(j);
    } catch(e) { setError(e.message); }
    finally    { setLoading(false); }
  }, [url]);
  useEffect(() => { load(); }, [load]);
  return { data, loading, error, refresh: load };
}

/* ── Chart.js wrapper ── */
function CJChart({ type, data, options, height=220 }) {
  const ref  = useRef(null);
  const inst = useRef(null);
  useEffect(() => {
    if (!ref.current || !data) return;
    if (inst.current) inst.current.destroy();
    inst.current = new Chart(ref.current, { type, data, options });
    return () => inst.current && inst.current.destroy();
  }, [type, data, options]);
  return <canvas ref={ref} height={height} />;
}

const baseOpts = (dark=true) => ({
  responsive: true, maintainAspectRatio: false,
  plugins: { legend: { labels: { color: dark ? '#9ca3af' : '#64748b', boxWidth:12, font:{size:11} } } },
});
const gridColor = (dark=true) => dark ? '#1f2937' : '#e2e8f0';
const tickColor  = (dark=true) => dark ? '#6b7280' : '#64748b';
const scaleOpts = (dark=true, axis='y', isMoney=false) => ({
  grid:{ color: axis==='x' ? 'transparent' : gridColor(dark) },
  ticks:{ color:tickColor(dark), font:{size:10},
    callback: isMoney ? (v) => `€${(v/1000).toFixed(0)}k` : undefined }
});

/* ── Skeleton ── */
const Sk = ({h='h-8',w='w-full',cls=''}) =>
  <div className={`sk ${h} ${w} ${cls}`} />;

/* ── KPI card ── */
const KPI = ({label, value, color='indigo', loading}) => {
  const bgs = {
    indigo:'from-indigo-900/50 to-indigo-800/20 border-indigo-700/30',
    cyan:  'from-cyan-900/50 to-cyan-800/20 border-cyan-700/30',
    emerald:'from-emerald-900/50 to-emerald-800/20 border-emerald-700/30',
    amber: 'from-amber-900/50 to-amber-800/20 border-amber-700/30',
    rose:  'from-rose-900/50 to-rose-800/20 border-rose-700/30',
    violet:'from-violet-900/50 to-violet-800/20 border-violet-700/30',
  };
  return (
    <div className={`rounded-xl border bg-gradient-to-br p-4 ${bgs[color]}`}>
      <p className="text-xs text-gray-400 uppercase tracking-wide mb-1">{label}</p>
      {loading ? <Sk h="h-7" w="w-3/4" /> : <p className="text-2xl font-bold text-white">{value}</p>}
    </div>
  );
};

/* ── Error banner ── */
const Err = ({msg, onRetry}) => (
  <div className="flex flex-col items-center justify-center gap-3 py-20 fade">
    <span className="text-4xl">⚠️</span>
    <p className="text-red-400 text-sm text-center max-w-md">{msg}</p>
    {onRetry && <button onClick={onRetry} className="px-4 py-1.5 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-sm">Reintentar</button>}
  </div>
);

/* ══════════════════════════════════════════════════════════════
   DASHBOARD
══════════════════════════════════════════════════════════════ */
function Dashboard() {
  const { data, loading, error, refresh } = useApi('/api/dashboard');
  const { data: forecastData } = useApi('/api/forecast');
  const { data: transitData }  = useApi('/api/transit');
  const dark = useTheme();

  const transitStats = useMemo(() => {
    const orders = (transitData?.orders || []).filter(o => (o.status || 'active') === 'active');
    const totalOrders = orders.length;
    const totalContainers = orders.reduce((a, o) => a + (o.odoo_po ? o.odoo_po.split(',').filter(Boolean).length : 0), 0);
    const today = new Date().toISOString().slice(0, 10);
    const soon30 = new Date(Date.now() + 30*24*3600*1000).toISOString().slice(0,10);
    const arrivingSoon = orders.filter(o => o.expected_arrival && o.expected_arrival <= soon30 && o.expected_arrival >= today).length;

    // Payment stats — use stored price if available, fall back to 0
    let totalPaid = 0, totalPending = 0, ordersWithoutPayment = 0, urgentPending = 0;
    orders.forEach(o => {
      const paid     = (o.payments||[]).reduce((a,p) => a+(parseFloat(p.amount)||0), 0);
      // Use stored order_total_usd if set, otherwise estimate from lines
      const orderVal = (o.lines||[]).reduce((a,l) => a + (parseFloat(l.qty)||0) * (parseFloat(l.price)||0), 0);
      const pending  = Math.max(0, orderVal - paid);
      totalPaid    += paid;
      totalPending += pending;
      if ((o.payments||[]).length === 0) ordersWithoutPayment++;
      // Urgent: arriving in <30 days with pending balance
      if (pending > 0 && o.expected_arrival && o.expected_arrival <= soon30 && o.expected_arrival >= today) urgentPending++;
    });
    return { totalOrders, totalContainers, arrivingSoon, totalPaid, totalPending, ordersWithoutPayment, urgentPending };
  }, [transitData]);

  const criticalProducts = useMemo(() => {
    if (!forecastData?.products) return [];
    return forecastData.products
      .filter(p => p.coverage_months < 2 && p.coverage_months > -99)
      .filter(p => !p.product_name.toUpperCase().includes('PACK'))
      .filter(p => !p.is_kit)
      .sort((a, b) => a.coverage_months - b.coverage_months)
      .slice(0, 8);
  }, [forecastData]);

  const trendChartData = useMemo(() => {
    if (!data?.trend) return null;
    return {
      labels: data.trend.map(d => d.month),
      datasets: [{
        label: 'Gasto',
        data: data.trend.map(d => d.amount),
        borderColor: '#6366f1',
        backgroundColor: 'rgba(99,102,241,0.15)',
        fill: true, tension: 0.4, pointRadius: 3,
        pointBackgroundColor: '#6366f1',
      }]
    };
  }, [data]);

  const trendOpts = useMemo(() => ({
    ...baseOpts(dark),
    scales: { x: scaleOpts(dark,'x'), y: scaleOpts(dark,'y',true) },
    plugins: { ...baseOpts(dark).plugins, legend: { display: false } },
  }), [dark]);

  const supplierChartData = useMemo(() => {
    if (!data?.top_suppliers) return null;
    return {
      labels: data.top_suppliers.map(s => s.name.length > 18 ? s.name.slice(0,17)+'…' : s.name),
      datasets: [{
        label: 'Gasto YTD',
        data: data.top_suppliers.map(s => s.amount),
        backgroundColor: COLORS,
        borderRadius: 4,
      }]
    };
  }, [data]);

  const supplierOpts = useMemo(() => ({
    ...baseOpts(dark),
    indexAxis: 'y',
    scales: {
      x: { ...scaleOpts(dark,'x',true), grid:{ color: gridColor(dark) } },
      y: { ticks:{ color: dark ? '#d1d5db' : '#334155', font:{size:10} }, grid:{ color:'transparent' } }
    },
    plugins: { ...baseOpts(dark).plugins, legend:{ display:false } },
  }), [dark]);

  if (error) return <Err msg={error} onRetry={refresh} />;

  const k = data?.kpis || {};
  return (
    <div className="space-y-5 fade">
      {/* KPIs */}
      <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3">
        <KPI label="Gasto del mes"    value={money(k.spend_month)}    color="indigo"  loading={loading} />
        <KPI label="Gasto YTD"        value={money(k.spend_ytd)}      color="cyan"    loading={loading} />
        <KPI label="OCs este mes"     value={num(k.orders_month)}     color="emerald" loading={loading} />
        <KPI label="OCs borrador"     value={num(k.draft_count)}      color="amber"   loading={loading} />
        <KPI label="OCs confirmadas"  value={num(k.confirmed_count)}  color="violet"  loading={loading} />
        <KPI label="Bajo stock mín."  value={num(k.low_stock_count)}  color="rose"    loading={loading} />
      </div>

      <div className="grid grid-cols-1 xl:grid-cols-2 gap-4">
        {/* Trend */}
        <div className="bg-gray-900 border border-gray-800 rounded-xl p-4">
          <h3 className="text-sm font-semibold text-gray-300 mb-3">Tendencia de gasto — últimos 12 meses</h3>
          <div style={{height:220}}>
            {loading ? <Sk h="h-full" /> : trendChartData && <CJChart type="line" data={trendChartData} options={trendOpts} height={220} />}
          </div>
        </div>
        {/* Suppliers */}
        <div className="bg-gray-900 border border-gray-800 rounded-xl p-4">
          <h3 className="text-sm font-semibold text-gray-300 mb-3">Top 10 proveedores por gasto (YTD)</h3>
          <div style={{height:220}}>
            {loading ? <Sk h="h-full" /> : supplierChartData && <CJChart type="bar" data={supplierChartData} options={supplierOpts} height={220} />}
          </div>
        </div>
      </div>

      {/* Transit summary widget */}
      {transitStats.totalOrders > 0 && (
        <div className="grid grid-cols-3 gap-3">
          <div className="bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 flex items-center gap-3">
            <span className="text-2xl">🚢</span>
            <div>
              <p className="text-xs text-gray-500">Pedidos en tránsito</p>
              <p className="text-xl font-bold text-white">{transitStats.totalOrders}</p>
            </div>
          </div>
          <div className="bg-gray-900 border border-gray-800 rounded-xl px-4 py-3 flex items-center gap-3">
            <span className="text-2xl">📦</span>
            <div>
              <p className="text-xs text-gray-500">Contenedores enviados a Odoo</p>
              <p className="text-xl font-bold text-purple-400">{transitStats.totalContainers}</p>
            </div>
          </div>
          <div className={`bg-gray-900 border rounded-xl px-4 py-3 flex items-center gap-3 ${transitStats.arrivingSoon > 0 ? 'border-orange-800/60' : 'border-gray-800'}`}>
            <span className="text-2xl">📅</span>
            <div>
              <p className="text-xs text-gray-500">Llegan en los próximos 30 días</p>
              <p className={`text-xl font-bold ${transitStats.arrivingSoon > 0 ? 'text-orange-400' : 'text-gray-500'}`}>{transitStats.arrivingSoon}</p>
            </div>
          </div>
        </div>
      )}

      {/* Critical stock */}
      {criticalProducts.length > 0 && (
        <div className="bg-gray-900 border border-red-900/40 rounded-xl overflow-hidden">
          <div className="px-4 py-3 border-b border-gray-800 flex items-center justify-between">
            <h3 className="text-sm font-semibold text-red-400">🔴 Stock crítico — menos de 2 meses de cobertura</h3>
            <span className="text-xs text-gray-500">{criticalProducts.length} producto{criticalProducts.length!==1?'s':''}</span>
          </div>
          <div className="overflow-x-auto">
            <table className="w-full text-sm">
              <thead>
                <tr className="text-xs text-gray-500 uppercase border-b border-gray-800">
                  <th className="px-4 py-2 text-left">Producto</th>
                  <th className="px-4 py-2 text-right">Stock actual</th>
                  <th className="px-4 py-2 text-right">Cobertura</th>
                  <th className="px-4 py-2 text-right">Sugerido</th>
                </tr>
              </thead>
              <tbody>
                {criticalProducts.map(p => {
                  const cov = p.coverage_months;
                  const covCls = cov <= 0 ? 'text-red-400' : cov < 1 ? 'text-orange-400' : 'text-yellow-400';
                  const covLabel = cov <= 0 ? 'Sin stock' : `${cov.toFixed(1)} meses`;
                  return (
                    <tr key={p.product_id} className="border-b border-gray-800/40 hover:bg-gray-800/30">
                      <td className="px-4 py-2.5">
                        <p className="text-gray-200 text-xs truncate max-w-xs" title={p.product_name}>{p.product_name}</p>
                        <p className="text-gray-500 text-xs">{p.old_sku}</p>
                      </td>
                      <td className="px-4 py-2.5 text-right text-gray-300 text-xs">{num(p.qty_available,0)} uds</td>
                      <td className={`px-4 py-2.5 text-right text-xs font-semibold ${covCls}`}>{covLabel}</td>
                      <td className="px-4 py-2.5 text-right text-xs font-bold text-white">{num(p.suggested_qty,0)} uds</td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </div>
      )}

      {/* Last orders */}
      <div className="bg-gray-900 border border-gray-800 rounded-xl overflow-hidden">
        <div className="px-4 py-3 border-b border-gray-800">
          <h3 className="text-sm font-semibold text-gray-300">Últimas 20 órdenes de compra</h3>
        </div>
        {loading

/* ── Mini sparkline (SVG) ─────────────────────────────────────────────────── */
function Spark({ data, color='#6366f1', w=80, h=28 }) {
  if (!data || data.length < 2) return null;
  const max = Math.max(...data, 0.01);
  const pts = data.map((v,i) => {
    const x = (i / (data.length-1)) * w;
    const y = h - (v / max) * h;
    return `${x},${y}`;
  }).join(' ');
  return (
    <svg width={w} height={h} className="overflow-visible">
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinejoin="round"/>
    </svg>
  );
}

/* ══════════════════════════════════════════════════════════════
   FORECAST
══════════════════════════════════════════════════════════════ */
function Forecast() {
  const { data, loading, error, refresh } = useApi('/api/forecast');
  const { data: transitData, refresh: refreshTransit } = useApi('/api/transit');
  const dark = useTheme();
  const readOnly = useReadOnly();
  const transitQtyByProduct = useMemo(() => {
    const map = {};
    const now = new Date();
    // Horizon: 6 months from today (exclusive — if arrival === horizon month, it arrives too late)
    const hz = new Date(now.getFullYear(), now.getMonth() + 5, 1);
    const horizonStr = `${hz.getFullYear()}-${String(hz.getMonth()+1).padStart(2,'0')}`;
    (transitData?.orders || []).forEach(o => {
      const arrival = o.expected_arrival; // "YYYY-MM" or ""
      // Count if: no date set (assume it arrives in time) OR arrives strictly before horizon
      if (arrival && arrival >= horizonStr) return;
      o.lines.forEach(l => { map[l.product_id] = (map[l.product_id] || 0) + l.qty; });
    });
    return map;
  }, [transitData]);
  const [refreshing, setRefreshing] = useState(false);
  const hardRefresh = async () => {
    setRefreshing(true);
    await apiFetch('/api/forecast/refresh');
    await refresh();
    setRefreshing(false);
  };
  const [brandFilter,  setBrandFilter]  = useState(52);   // Titanium Strength default
  const [vendorFilter, setVendorFilter] = useState('all');
  const [search,       setSearch]       = useState('');
  const [quantities,   setQuantities]   = useState({});
  const [expandedPid,  setExpandedPid]  = useState(null);
  const [chartData,    setChartData]    = useState(null);
  const [instruction,  setInstruction]  = useState('');
  const [instrLog,     setInstrLog]     = useState([]);
  const [sortBy,       setSortBy]       = useState('coverage');   // 'coverage' | 'forecast'
  const [urgencyFilter,setUrgencyFilter]= useState(null);         // null | 3 | 5 | 'no_movement'
  const [newProductFilter, setNewProductFilter] = useState(false); // true = solo productos nuevos (<6m)
  const [summaryOpen,  setSummaryOpen]  = useState(false);
  const [selectedPids,  setSelectedPids]  = useState(new Set());
  const [quickAddModal, setQuickAddModal] = useState(null);
  const [quickAddForm,  setQuickAddForm]  = useState({ ref:'', supplier:'', order_date: new Date().toISOString().slice(0,10), expected_arrival:'', targetOrderId:'new' });
  const [quickAddLines, setQuickAddLines] = useState([]);
  const [quickAddSaving,setQuickAddSaving]= useState(false);
  const [existingOrders,setExistingOrders]= useState([]);

  const toggleSelect = (pid) => setSelectedPids(prev => {
    const s = new Set(prev);
    s.has(pid) ? s.delete(pid) : s.add(pid);
    return s;
  });

  const openQuickAdd = async () => {
    // Only include products that have a quantity > 0 in "Cant. Compra"
    const selectedProducts = filtered.filter(p =>
      selectedPids.has(p.product_id) && (parseFloat(quantities[p.product_id]) || 0) > 0
    );
    if (selectedProducts.length === 0) {
      alert('Ningún producto seleccionado tiene unidades en "Cant. Compra". Introduce las cantidades primero.');
      return;
    }
    const firstVendor = selectedProducts[0].vendor || '';
    let existing = [];
    try {
      const r = await apiFetch('/api/transit');
      const j = await r.json();
      existing = (j.orders || []).filter(o => (o.status||'active') === 'active');
    } catch(e) {}
    setExistingOrders(existing);
    // Prices in Odoo are EUR (standard_price). Convert to USD using today's rate.
    const eurToUsd = rates?.USD || 1;
    setQuickAddLines(selectedProducts.map(p => ({
      product_id: p.product_id,
      product_name: p.product_name,
      qty: parseFloat(quantities[p.product_id]),
      price: Math.round(((p.vendor_price || p.avg_price || 0) * eurToUsd) * 100) / 100,
    })));
    setQuickAddForm({ ref:'', supplier: firstVendor, order_date: new Date().toISOString().slice(0,10), expected_arrival:'', targetOrderId:'new' });
    setQuickAddModal(true);
  };

  const saveQuickAdd = async () => {
    if (!quickAddForm.ref && quickAddForm.targetOrderId === 'new') return;
    setQuickAddSaving(true);
    try {
      const linesToSave = quickAddLines.filter(l => (parseFloat(l.qty)||0) > 0);
      if (linesToSave.length === 0) { setQuickAddSaving(false); return; }
      let res;
      if (quickAddForm.targetOrderId === 'new') {
        res = await apiFetch('/api/transit', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ ref: quickAddForm.ref, supplier: quickAddForm.supplier, order_date: quickAddForm.order_date, expected_arrival: quickAddForm.expected_arrival, lines: linesToSave }),
        });
      } else {
        const r = await apiFetch('/api/transit');
        const j = await r.json();
        const order = j.orders.find(o => o.id === quickAddForm.targetOrderId);
        if (order) {
          const existingPids = new Set(order.lines.map(l => l.product_id));
          const merged = [...order.lines, ...linesToSave.filter(l => !existingPids.has(l.product_id))];
          res = await apiFetch(`/api/transit/${order.id}`, {
            method:'PATCH', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ ...order, lines: merged }),
          });
        }
      }
      if (res && !res.ok) {
        const errText = await res.text();
        alert(`Error al guardar: ${res.status} — ${errText}`);
        setQuickAddSaving(false);
        return;
      }
      setQuickAddModal(null);
      setSelectedPids(new Set());
      // Refresh transit data so the new order appears immediately
      refreshTransit();
    } catch(e) {
      alert(`Error de red: ${e.message}`);
    }
    setQuickAddSaving(false);
  };
  const [drafts,       setDrafts]       = useState(() => {
    try { return JSON.parse(localStorage.getItem('opi_drafts') || '[]'); } catch { return []; }
  });

  const products = data?.products || [];
  const brands   = data?.brands   || [];

  // Vendors for the selected brand (sorted alphabetically)
  const vendorsForBrand = useMemo(() => {
    // Only show vendors that have at least one product visible after all filters
    // except the vendor filter itself (so switching vendor doesn't collapse the list)
    const byBrand = products.filter(p => {
      const brandOk  = brandFilter === 'all' || p.brand_id === brandFilter;
      const searchOk = !search || (p.display_name||'').toLowerCase().includes(search.toLowerCase());
      const newOk    = !newProductFilter || (p.create_date && p.create_date >= sixMonthsAgo);
      if (!brandOk || !searchOk || !newOk) return false;
      if (p.no_movement && !newProductFilter) return false;
      return true;
    });
    const seen = {};
    byBrand.forEach(p => { if (p.vendor && p.vendor !== '—') seen[p.vendor] = true; });
    return Object.keys(seen).sort();
  }, [products, brandFilter, search, newProductFilter, sixMonthsAgo]);

  // Reset vendor filter when brand changes
  const selectBrand = (bid) => { setBrandFilter(bid); setVendorFilter('all'); setExpandedPid(null); };

  // Urgency counts for badge/filters (across current brand, ignoring urgencyFilter)
  const urgentCount  = useMemo(() => products.filter(p =>
    (brandFilter === 'all' || p.brand_id === brandFilter) &&
    !p.no_movement && p.coverage_months < 5 && p.coverage_months > -99
  ).length, [products, brandFilter]);
  const criticalCount = useMemo(() => products.filter(p =>
    (brandFilter === 'all' || p.brand_id === brandFilter) &&
    !p.no_movement && p.coverage_months < 3 && p.coverage_months > -99
  ).length, [products, brandFilter]);
  const noMovementCount = useMemo(() => products.filter(p =>
    (brandFilter === 'all' || p.brand_id === brandFilter) &&
    (p.no_movement || p.no_recent_sales)
  ).length, [products, brandFilter]);

  // New products: created in the last 6 months
  const sixMonthsAgo = useMemo(() => {
    const d = new Date();
    d.setMonth(d.getMonth() - 6);
    return d.toISOString().slice(0, 10); // YYYY-MM-DD
  }, []);
  const isNewProduct = (p) => p.create_date && p.create_date >= sixMonthsAgo;
  const newProductCount = useMemo(() => products.filter(p =>
    (brandFilter === 'all' || p.brand_id === brandFilter) && isNewProduct(p)
  ).length, [products, brandFilter, sixMonthsAgo]);

  const filtered = useMemo(() => {
    let list = products.filter(p => {
      const brandOk  = brandFilter === 'all' || p.brand_id === brandFilter;
      const vendorOk = vendorFilter === 'all' || p.vendor === vendorFilter;
      const searchOk = !search || p.product_name.toLowerCase().includes(search.toLowerCase());
      const newOk    = !newProductFilter || isNewProduct(p);
      if (urgencyFilter === 'no_movement') {
        return brandOk && vendorOk && searchOk && newOk && (p.no_movement || p.no_recent_sales);
      }
      // Normal mode: always hide pure no_movement products (0 sales 12m)
      if (p.no_movement && !newProductFilter) return false;
      return brandOk && vendorOk && searchOk && newOk &&
        (urgencyFilter === null || (p.coverage_months < urgencyFilter && p.coverage_months > -99));
    });
    if (sortBy === 'coverage') {
      list = [...list].sort((a, b) => a.coverage_months - b.coverage_months);
    }
    if (sortBy === 'sku') {
      list = [...list].sort((a, b) => (a.old_sku || a.display_name || '').localeCompare(b.old_sku || b.display_name || ''));
    }
    if (urgencyFilter === 'no_movement') {
      list = [...list].sort((a, b) => (b.qty_available||0) - (a.qty_available||0));
    }
    if (newProductFilter) {
      // Sort new products by creation date desc (newest first)
      list = [...list].sort((a, b) => (b.create_date || '').localeCompare(a.create_date || ''));
    }
    return list;
  }, [products, brandFilter, vendorFilter, search, urgencyFilter, sortBy, newProductFilter, sixMonthsAgo]);

  // Totals for footer
  const totalQtyToBuy   = useMemo(() => filtered.reduce((a,p) => a + (parseFloat(quantities[p.product_id])||0), 0), [filtered, quantities]);
  const totalAmountToBuy= useMemo(() => filtered.reduce((a,p) => a + (parseFloat(quantities[p.product_id])||0)*(p.vendor_price||p.avg_price), 0), [filtered, quantities]);
  const totalVelocity   = useMemo(() => filtered.reduce((a,p) => a + p.monthly_velocity, 0), [filtered]);
  const totalForecast   = useMemo(() => filtered.reduce((a,p) => a + p.total_forecast_qty, 0), [filtered]);

  // Resumen por fábrica — usa TODOS los productos (todas las marcas) con cantidad asignada
  // Así al cambiar de marca el resumen global se mantiene
  const summaryByVendor = useMemo(() => {
    const map = {};
    products.forEach(p => {
      const qty = parseFloat(quantities[p.product_id]) || 0;
      if (qty <= 0) return;
      const vendor = p.vendor || '—';
      const price  = p.vendor_price || p.avg_price || 0;
      if (!map[vendor]) map[vendor] = { vendor, products: 0, units: 0, amount: 0, items: [] };
      map[vendor].products += 1;
      map[vendor].units    += qty;
      map[vendor].amount   += qty * price;
      map[vendor].items.push({
        name: p.product_name, brand: p.brand_name, qty, price,
        total: qty * price, code: p.vendor_code
      });
    });
    return Object.values(map).sort((a, b) => b.amount - a.amount);
  }, [products, quantities]);

  // Totals across ALL brands (for the summary footer)
  const summaryTotalUnits  = useMemo(() => summaryByVendor.reduce((a,v) => a+v.units,  0), [summaryByVendor]);
  const summaryTotalAmount = useMemo(() => summaryByVendor.reduce((a,v) => a+v.amount, 0), [summaryByVendor]);

  // Pre-fill quantities: use backend-calculated suggested_qty
  // = max(0, 6-month sales forecast − virtual_available)
  // Only fills products that actually need ordering (suggested_qty > 0)
  // Draft save / load / export / import
  const saveDraft = () => {
    const name = window.prompt('Nombre del borrador:', `Plan ${new Date().toLocaleDateString('es-ES')}`);
    if (!name) return;
    const filled = Object.entries(quantities).filter(([,v]) => parseFloat(v) > 0);
    const draft = {
      name,
      date: new Date().toISOString().slice(0,10),
      quantities: Object.fromEntries(filled),
      meta: {
        total_units:  filled.reduce((a,[,v]) => a + parseFloat(v), 0),
        total_amount: filled.reduce((a,[pid,v]) => {
          const p = products.find(x => x.product_id == pid);
          return a + parseFloat(v) * (p?.vendor_price || p?.avg_price || 0);
        }, 0),
        products_count: filled.length,
      }
    };
    const updated = [...drafts, draft];
    setDrafts(updated);
    localStorage.setItem('opi_drafts', JSON.stringify(updated));
  };

  const loadDraft = (draft) => setQuantities(draft.quantities);

  const deleteDraft = (idx) => {
    if (!window.confirm('¿Eliminar este borrador?')) return;
    const updated = drafts.filter((_,i) => i !== idx);
    setDrafts(updated);
    localStorage.setItem('opi_drafts', JSON.stringify(updated));
  };

  const exportDraft = (draft) => {
    const blob = new Blob([JSON.stringify(draft, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `${draft.name.replace(/[^a-z0-9]/gi,'_')}_${draft.date}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importDraft = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const draft = JSON.parse(ev.target.result);
        if (!draft.quantities) throw new Error('Formato inválido');
        const updated = [...drafts, { ...draft, name: draft.name + ' (importado)', date: new Date().toISOString().slice(0,10) }];
        setDrafts(updated);
        localStorage.setItem('opi_drafts', JSON.stringify(updated));
        setQuantities(draft.quantities);
      } catch { alert('Archivo JSON inválido'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const prefillForecast = () => {
    const upd = {};
    filtered.forEach(p => {
      const transit = transitQtyByProduct[p.product_id] || 0;
      const adjusted = Math.max(0, Math.round(p.total_forecast_qty - (p.virtual_available + transit)));
      if (adjusted > 0) upd[p.product_id] = adjusted;
    });
    setQuantities(prev => ({...prev, ...upd}));
  };
  const clearQuantities = () => setQuantities({});

  // ── Natural-language instruction parser ────────────────────────────────────
  const applyInstruction = () => {
    const raw = instruction.trim();
    if (!raw) return;
    const text = raw.toLowerCase()
      .normalize('NFD').replace(/[̀-ͯ]/g, '')  // strip accents
      .trim();

    let result = { ...quantities };
    const msgs = [];

    // Helper: ensure a product has a base quantity (auto-fill if 0/empty)
    const base = (p) => {
      const v = parseFloat(result[p.product_id]);
      if (v > 0) return v;
      // auto-seed with backend suggested_qty
      return p.suggested_qty || 0;
    };

    // ── 1. RESET / LIMPIAR ──
    if (/^(limpiar?|borrar?|reset|reiniciar?|vaciar?|clear)/.test(text)) {
      result = {};
      msgs.push('✓ Cantidades limpiadas');
    }

    // ── 2. RELLENAR pronóstico desde cero ──
    else if (/^(rellena(r)?|pronostico|calcular?|auto)/.test(text)) {
      let filled = 0;
      filtered.forEach(p => {
        if ((p.suggested_qty || 0) > 0) { result[p.product_id] = p.suggested_qty; filled++; }
      });
      msgs.push(`✓ ${filled} productos rellenados (ventas 5m − stock disponible)`);
    }

    else {
      let matched = false;

      // ── 3. MULTIPLICAR ── "multiplica por 1.5", "x1.5", "×1.5", "*1.5", "factor 1.5"
      const mulM = text.match(/(?:multiplica(?:\s+por)?|factor|[×x\*])\s*(\d+(?:[.,]\d+)?)/);
      if (mulM) {
        const f = parseFloat(mulM[1].replace(',', '.'));
        if (!isNaN(f) && f > 0) {
          filtered.forEach(p => { result[p.product_id] = Math.ceil(base(p) * f); });
          msgs.push(`✓ Multiplicado por ${f}`);
          matched = true;
        }
      }

      // ── 4. AUMENTAR % ── "aumenta 20%", "+20%", "añade 20%", "incrementa 20%", "margen 20%"
      const addM = text.match(/(?:aumenta(?:r)?|aniade?(?:r)?|incrementa(?:r)?|margen|\+)\s*(\d+(?:[.,]\d+)?)\s*%/);
      if (addM) {
        const pct = parseFloat(addM[1].replace(',', '.')) / 100;
        if (!isNaN(pct) && pct > 0) {
          filtered.forEach(p => { result[p.product_id] = Math.ceil(base(p) * (1 + pct)); });
          msgs.push(`✓ Aumentado un ${Math.round(pct*100)}%`);
          matched = true;
        }
      }

      // ── 5. REDUCIR % ── "reduce 20%", "baja 20%", "descuenta 20%", "-20%"
      const redM = text.match(/(?:reduce?(?:ir)?|baja(?:r)?|disminuye?(?:ir)?|descuenta?|-)\s*(\d+(?:[.,]\d+)?)\s*%/);
      if (redM) {
        const pct = parseFloat(redM[1].replace(',', '.')) / 100;
        if (!isNaN(pct) && pct > 0) {
          filtered.forEach(p => { result[p.product_id] = Math.max(0, Math.ceil(base(p) * (1 - pct))); });
          msgs.push(`✓ Reducido un ${Math.round(pct*100)}%`);
          matched = true;
        }
      }

      // ── 6. MÍNIMO ── "mínimo 5", "min 5", "al menos 5"
      const minM = text.match(/(?:minimo|min|al\s+menos)\s*(\d+)/);
      if (minM) {
        const minVal = parseInt(minM[1]);
        if (!isNaN(minVal) && minVal >= 0) {
          filtered.forEach(p => { result[p.product_id] = Math.max(base(p), minVal); });
          msgs.push(`✓ Mínimo ${minVal} uds por producto`);
          matched = true;
        }
      }

      // ── 7. MÁXIMO ── "máximo 50", "max 50"
      const maxM = text.match(/(?:maximo|max(?:imo)?)\s*(\d+)/);
      if (maxM) {
        const maxVal = parseInt(maxM[1]);
        if (!isNaN(maxVal) && maxVal >= 0) {
          filtered.forEach(p => { result[p.product_id] = Math.min(base(p), maxVal); });
          msgs.push(`✓ Máximo ${maxVal} uds por producto`);
          matched = true;
        }
      }

      // ── 8. REDONDEAR A MÚLTIPLOS ── "redondea a 6", "múltiplos de 6", "cajas de 6", "packs de 12"
      const rndM = text.match(/(?:redondea(?:\s+a)?|multiplos?\s+de|cajas?\s+de|packs?\s+de|unidades?\s+de|lotes?\s+de)\s*(\d+)/);
      if (rndM) {
        const mult = parseInt(rndM[1]);
        if (!isNaN(mult) && mult > 0) {
          filtered.forEach(p => {
            const b = base(p);
            result[p.product_id] = b > 0 ? Math.ceil(b / mult) * mult : 0;
          });
          msgs.push(`✓ Redondeado a múltiplos de ${mult}`);
          matched = true;
        }
      }

      // ── 9. MESES DE SEGURIDAD ── "2 meses de seguridad", "añade 1 mes de stock"
      const msM = text.match(/(\d+(?:[.,]\d+)?)\s*meses?\s+(?:de\s+)?(?:seguridad|stock|extra|buffer)/);
      if (msM) {
        const months = parseFloat(msM[1].replace(',', '.'));
        if (!isNaN(months) && months > 0) {
          filtered.forEach(p => {
            const monthly = p.total_forecast_qty / 3;
            const safety  = Math.ceil(months * monthly);
            result[p.product_id] = base(p) + safety;
          });
          msgs.push(`✓ Añadido ${months} mes(es) de stock de seguridad`);
          matched = true;
        }
      }

      // ── 10. SOLO DÉFICIT / SOLO NEGATIVOS ──
      if (/solo\s+(?:deficit|negativos?|rotura|los\s+que\s+faltan|urgentes?)/.test(text) ||
          /sin\s+stock/.test(text)) {
        filtered.forEach(p => { if (p.virtual_available >= 0) delete result[p.product_id]; });
        msgs.push('✓ Solo productos con stock negativo / déficit');
        matched = true;
      }

      // ── 11. SUMAR CANTIDAD FIJA ── "suma 10", "añade 5 unidades"
      const sumM = text.match(/(?:suma(?:r)?|aniade?(?:r)?|agrega(?:r)?)\s*(\d+)\s*(?:u(?:ds?|nidades?)?)?(?:\s+a\s+todo)?/);
      if (sumM && !addM) {  // avoid conflict with % increase
        const add = parseInt(sumM[1]);
        if (!isNaN(add) && add > 0) {
          filtered.forEach(p => { result[p.product_id] = base(p) + add; });
          msgs.push(`✓ Sumado ${add} uds a cada producto`);
          matched = true;
        }
      }

      if (!matched) {
        setInstrLog(prev => [{text: raw, ok: false, msg: '❓ No entendí la instrucción'}, ...prev.slice(0,4)]);
        setInstruction('');
        return;
      }
    }

    setQuantities(result);
    setInstrLog(prev => [{text: raw, ok: true, msg: msgs.join(' · ')}, ...prev.slice(0,4)]);
    setInstruction('');
  };

  // Toggle chart for a row
  const toggleChart = (p) => {
    if (expandedPid === p.product_id) { setExpandedPid(null); return; }
    setExpandedPid(p.product_id);
    const hist = p.history || [];
    const fore = p.forecast || [];
    setChartData({
      product: p,
      data: {
        labels: [...hist.map(h=>h.month), ...fore.map(f=>f.month)],
        datasets: [
          { type:'bar', label:'Ventas reales',
            data:[...hist.map(h=>h.qty), ...fore.map(()=>null)],
            backgroundColor:'rgba(99,102,241,0.45)', borderColor:'#6366f1', borderWidth:1 },
          { type:'line', label:'Pronóstico 5m',
            data:[...hist.map(()=>null), ...fore.map(f=>f.qty)],
            borderColor:'#22d3ee', backgroundColor:'rgba(34,211,238,0.1)',
            fill:true, tension:0.4, borderDash:[5,4], pointRadius:5, pointBackgroundColor:'#22d3ee' },
        ]
      }
    });
  };

  const chartOpts = useMemo(() => ({
    ...baseOpts(dark),
    scales: { x: scaleOpts(dark,'x'), y: scaleOpts(dark,'y') },
    plugins: { ...baseOpts(dark).plugins },
  }), [dark]);

  // Excel export
  const exportExcel = () => {
    const XLSX = window.XLSX;
    if (!XLSX) return alert('SheetJS no cargado');
    const brand = brands.find(b=>b.id===brandFilter);
    const rows = [
      ['Producto','SKU Antiguo','Fabricante','Proveedor','Cód. Proveedor',
       'Stock Actual','+ Entradas pendientes','− Salidas confirmadas','= Stock Previsto',
       'Venta/mes (uds)','Cobertura (meses)','Pron. 5m (uds ventas)',
       'Pron. M1','Pron. M2','Pron. M3','Pron. M4','Pron. M5','Pron. M6',
       'Cant. sugerida','Cantidad a comprar','Precio unit.','Total compra','Tendencia'],
    ];
    filtered.forEach(p => {
      const qty = parseFloat(quantities[p.product_id])||0;
      const cov = p.coverage_months >= 99 ? '' : p.coverage_months;
      rows.push([
        p.product_name, p.old_sku||'', p.brand_name, p.vendor, p.vendor_code,
        p.qty_available, p.incoming_qty, p.outgoing_qty, p.virtual_available,
        p.monthly_velocity, cov, p.total_forecast_qty,
        p.forecast[0]?.qty||0, p.forecast[1]?.qty||0, p.forecast[2]?.qty||0,
        p.forecast[3]?.qty||0, p.forecast[4]?.qty||0, p.forecast[5]?.qty||0,
        p.suggested_qty||0, qty, p.vendor_price||p.avg_price, qty*(p.vendor_price||p.avg_price),
        TREND[p.trend]?.label||p.trend,
      ]);
    });
    // Totals row
    rows.push(['TOTAL','','','','','','','','',num(totalVelocity,1),'',num(totalForecast,0),
               '','','','','','','',totalQtyToBuy,'',totalAmountToBuy,'']);

    const ws = XLSX.utils.aoa_to_sheet(rows);
    // Column widths
    ws['!cols'] = [40,16,18,30,14,10,12,12,12,10,10,12,9,9,9,9,9,9,12,14,12,14,10].map(w=>({wch:w}));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, brand?.name||'Compras');
    XLSX.writeFile(wb, `compras_${brand?.name||'todos'}_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  if (error) return <Err msg={error} onRetry={refresh} />;

  return (

      {/* ── Quick-add to transit modal overlay ─────────────────────── */}

            <div className="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-lg shadow-2xl flex flex-col" style={{maxHeight:'90vh'}}>
              {/* Header */}
              <div className="px-6 py-4 border-b border-gray-800 flex items-center justify-between shrink-0">

                </div>
                <button onClick={() => setQuickAddModal(null)} className="text-gray-500 hover:text-white text-xl leading-none">×</button>
              </div>
              {/* Body */}
              <div className="px-6 py-4 space-y-3 overflow-y-auto flex-1">
                {/* Target order selector */}
                {existingOrders.length > 0 && (
                  <div>
                    <label className="text-xs text-gray-400 block mb-1">Añadir a</label>
                    <select value={quickAddForm.targetOrderId}
                      onChange={e => setQuickAddForm(f => ({...f, targetOrderId: e.target.value}))}
                      className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:border-amber-500 outline-none">
                      <option value="new">+ Nuevo pedido</option>
                      {existingOrders.map(o => <option key={o.id} value={o.id}>{o.ref} ({o.supplier})</option>)}
                    </select>
                  </div>
                )}
                {/* New order fields */}
                {isNew && <>
                  <div>
                    <label className="text-xs text-gray-400 block mb-1">Referencia del pedido *</label>
                    <input value={quickAddForm.ref} onChange={e => setQuickAddForm(f=>({...f,ref:e.target.value}))}
                      placeholder="ej. TZ-124" className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:border-amber-500 outline-none" />
                  </div>
                  <div>
                    <label className="text-xs text-gray-400 block mb-1">Proveedor</label>
                    <input value={quickAddForm.supplier} onChange={e => setQuickAddForm(f=>({...f,supplier:e.target.value}))}
                      className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:border-amber-500 outline-none" />
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-xs text-gray-400 block mb-1">Fecha de pedido</label>
                      <input type="date" value={quickAddForm.order_date} onChange={e => setQuickAddForm(f=>({...f,order_date:e.target.value}))}
                        className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:border-amber-500 outline-none" />
                    </div>
                    <div>
                      <label className="text-xs text-gray-400 block mb-1">Llegada estimada</label>
                      <input type="month" value={quickAddForm.expected_arrival} onChange={e => setQuickAddForm(f=>({...f,expected_arrival:e.target.value}))}
                        className="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-white focus:border-amber-500 outline-none" />
                    </div>
                  </div>
                </>}
                {/* Product lines */}
                <div>
                  <label className="text-xs text-gray-400 block mb-2">Productos y cantidades</label>
                  <div className="space-y-1.5 max-h-64 overflow-y-auto pr-1">
                    {quickAddLines.map((line, i) => (
                      <div key={line.product_id} className="flex items-center gap-2 bg-gray-800/60 border border-gray-700/50 rounded-lg px-3 py-2">
                        <span className="text-xs text-gray-300 flex-1 truncate min-w-0" title={line.product_name}>{line.product_name}</span>
                        <input type="number" min="0" step="1"
                          value={line.qty}

                            setQuickAddLines(prev => prev.map((l,j) => j===i ? {...l, qty:v} : l));
                          }}
                          title="Cantidad"
                          className="w-20 px-2 py-1 rounded text-sm text-center bg-gray-900 border border-gray-600 text-emerald-300 font-semibold focus:border-amber-500 outline-none shrink-0" />
                        <input type="number" min="0" step="0.01"
                          value={line.price ?? ''}
                          onChange={e => {
                            const v = parseFloat(e.target.value)||0;
                            setQuickAddLines(prev => prev.map((l,j) => j===i ? {...l, price:v} : l));
                          }}
                          title="Precio unitario"
                          placeholder="precio"
                          className="w-24 px-2 py-1 rounded text-sm text-right bg-gray-900 border border-gray-600 text-amber-200 focus:border-amber-500 outline-none shrink-0" />
                        <span className="text-xs text-emerald-400 w-20 text-right shrink-0">
                          {line.qty > 0 && line.price > 0 ? money(line.qty * line.price) : '—'}
                        </span>
                        <button onClick={() => setQuickAddLines(prev => prev.filter((_,j) => j!==i))}
                          className="text-gray-600 hover:text-red-400 text-sm leading-none shrink-0">×</button>
                      </div>
                    ))}
                  </div>
                </div>
                {totalLines > 0 && (
                  <div className="text-right text-xs text-emerald-400 font-semibold">
                    Total estimado: {money(totalLines)}
                  </div>

              </div>
              {/* Footer */}
              <div className="px-6 py-4 border-t border-gray-800 flex gap-3 justify-end shrink-0">
                <button onClick={() => setQuickAddModal(null)} className="px-4 py-2 rounded-lg text-sm bg-gray-800 border border-gray-700 text-gray-300 hover:bg-gray-700">Cancelar</button>
                <button onClick={saveQuickAdd} disabled={quickAddSaving || (isNew && !quickAddForm.ref) || quickAddLines.length === 0}
                  className="px-4 py-2 rounded-lg text-sm bg-amber-600 hover:bg-amber-500 disabled:opacity-40 text-white font-semibold">
                  {quickAddSaving ? '⏳ Guardando...' : '💾 Guardar en tránsito'}
                </button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── Brand filter + actions ── */}

          <select value={brandFilter === 'all' ? 'all' : brandFilter}
            onChange={e => selectBrand(e.target.value === 'all' ? 'all' : parseInt(e.target.value))}

        <div className="ml-auto flex items-center gap-2">

            💾 Guardar

          <button onClick={exportExcel}

          <button onClick={hardRefresh} disabled={refreshing}

            className="px-2.5 py-1.5 rounded-lg text-xs bg-gray-700 hover:bg-gray-600 disabled:opacity-50 text-gray-300 border border-gray-600 transition-colors">
            {refreshing ? '⏳' : '🔄'}

      {/* ── Urgency filters + sort ── */}
      {!loading && products.length > 0 && (
        <div className="flex items-center gap-2 flex-wrap">
          <span className="text-xs text-gray-500 font-medium uppercase tracking-wide">Urgencia</span>
          {[
            { val: null,          label: 'Todos',          count: products.filter(p => (brandFilter==='all'||p.brand_id===brandFilter) && !p.no_movement).length, cls: 'border-gray-700 text-gray-400 hover:bg-gray-800' },
            { val: 5,             label: '⚠️ Urgente <5m', count: urgentCount,      cls: 'border-orange-700/60 text-orange-300 hover:bg-orange-900/30' },
            { val: 3,             label: '🔴 Crítico <3m', count: criticalCount,    cls: 'border-red-700/60 text-red-300 hover:bg-red-900/30' },
            { val: 'no_movement', label: '🚫 Sin venta',   count: noMovementCount,  cls: 'border-purple-700/60 text-purple-300 hover:bg-purple-900/30' },
          ].map(({ val, label, count, cls }) => (
            <button key={String(val)} onClick={() => setUrgencyFilter(val)}
              className={`px-3 py-1 rounded-lg text-xs font-medium border transition-colors
                ${urgencyFilter===val ? 'bg-indigo-600 border-indigo-500 text-white' : `bg-transparent ${cls}`}`}>

                {summaryByVendor.length} fábrica{summaryByVendor.length>1?'s':''} · {num(summaryTotalUnits,0)} uds
              </span>
            </div>
            <div className="flex items-center gap-4">
              <span className="text-base font-bold text-emerald-400">{money(summaryTotalAmount)}</span>
              <span className="text-gray-500 text-xs">{summaryOpen ? '▼' : '▲'}</span>
            </div>
          </button>
        </div>
      )}
    </div>
  );
}

  return (
    <div className="flex items-center gap-2 text-xs">
      <span className={`w-2 h-2 rounded-full ${data?.connected ? 'bg-emerald-400 shadow-[0_0_6px_#34d399]' : 'bg-red-500'}`}/>

  );
}

/* ══════════════════════════════════════════════════════════════
   TRÁNSITO — pedidos realizados pero no en Odoo aún
══════════════════════════════════════════════════════════════ */
function Transit() {
  const { data: forecastData } = useApi('/api/forecast');
  const [orders,    setOrders]    = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [showForm,  setShowForm]  = useState(false);
  const [expanded,  setExpanded]  = useState({});
  const [form,      setForm]      = useState({ ref:'', supplier:'', order_date: new Date().toISOString().slice(0,10), expected_arrival:'' });
  const [lines,        setLines]        = useState([]);
  const [pSearch,      setPSearch]      = useState('');
  const [editingOrder,    setEditingOrder]    = useState(null);
  const [supplierFilter,  setSupplierFilter]  = useState('all');
  const [sendingOdoo,     setSendingOdoo]     = useState(new Set());
  const [odooResult,      setOdooResult]      = useState(null); // { po_name, error }
  const [containerModal,  setContainerModal]  = useState(null); // { order, lines, containerRef }
  const [archiveModal,    setArchiveModal]    = useState(null); // { order }
  const [archiveDate,     setArchiveDate]     = useState('');
  const [showHistory,     setShowHistory]     = useState(false);
  const [rates,           setRates]           = useState(null);  // { CNY, USD }
  const [paymentModal,    setPaymentModal]    = useState(null);  // { order }
  const [paymentForm,     setPaymentForm]     = useState({ payments:[], currency:'USD', notes:'', files:[] });
  const [paymentSaving,   setPaymentSaving]   = useState(false);
  const [fileUploading,   setFileUploading]   = useState(false);
  const [paymentFilter,   setPaymentFilter]   = useState('all'); // 'all'|'none'|'partial'|'complete'
  const [transitSort,     setTransitSort]     = useState('arrival'); // 'arrival'|'order_date'|'created'

  React.useEffect(() => {
    fetch('/api/exchange-rates').then(r=>r.json()).then(setRates).catch(()=>{});
  }, []);

  const activeOrders   = orders.filter(o => (o.status||'active') === 'active');
  const archivedOrders = orders.filter(o => o.status === 'archived');

  const arrivalClass = (dateStr) => {
    if (!dateStr) return 'text-gray-500 bg-gray-800/60 border-gray-700/50';
    const today = new Date().toISOString().slice(0,7);
    const d30   = new Date(Date.now()+30*24*3600*1000).toISOString().slice(0,7);
    const d60   = new Date(Date.now()+60*24*3600*1000).toISOString().slice(0,7);
    if (dateStr < today) return 'text-red-400 bg-red-900/30 border-red-800/50';
    if (dateStr <= d30)  return 'text-orange-400 bg-orange-900/30 border-orange-800/50';
    if (dateStr <= d60)  return 'text-amber-400 bg-amber-900/30 border-amber-800/50';
    return 'text-gray-400 bg-gray-800/40 border-gray-700/50';
  };

  // Returns 'none' | 'partial' | 'complete' for an order
  const getPaymentStatus = (order) => {
    const pmts = order.payments || [];
    if (pmts.length === 0) return 'none';
    const paid     = pmts.reduce((a,p) => a+(parseFloat(p.amount)||0), 0);
    const orderVal = (order.lines||[]).reduce((a,l) => a+(parseFloat(l.qty)||0)*(parseFloat(l.price)||0), 0);
    if (orderVal > 0 && paid >= orderVal) return 'complete';
    return 'partial';
  };

  const archiveOrder = async () => {
    if (!archiveModal) return;
    await apiFetch(`/api/transit/${archiveModal.order.id}/archive`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ actual_arrival: archiveDate }),
    });
    setArchiveModal(null); setArchiveDate('');
    loadOrders();
  };
  const readOnly = useReadOnly();
  const allProducts = forecastData?.products || [];

  // Price lookup: product_id → vendor_price (or avg_price as fallback)
  const priceMap = useMemo(() => {
    const m = {};
    allProducts.forEach(p => { m[p.product_id] = p.vendor_price || p.avg_price || 0; });
    return m;
  }, [allProducts]);

  const suppliers = useMemo(() => {
    const s = new Set(orders.map(o => o.supplier).filter(Boolean));
    return [...s].sort();
  }, [orders]);

  const loadOrders = async () => {
    setLoading(true);
    try {
      const r = await apiFetch('/api/transit');
      const j = await r.json();
      // Sort by expected_arrival ascending; orders without date go to the end
      const sorted = (j.orders || []).sort((a, b) => {
        if (!a.expected_arrival && !b.expected_arrival) return 0;
        if (!a.expected_arrival) return 1;
        if (!b.expected_arrival) return -1;
        return a.expected_arrival.localeCompare(b.expected_arrival);
      });
      setOrders(sorted);
    } catch(e) {}
    setLoading(false);
  };
  useEffect(() => { loadOrders(); }, []);

  const deleteOrder = async (id) => {
    if (!window.confirm('¿Eliminar este pedido y todas sus líneas?')) return;
    await apiFetch(`/api/transit/${id}`, { method:'DELETE' });
    loadOrders();
  };
  const deleteLine = async (orderId, lineId) => {
    await apiFetch(`/api/transit/${orderId}/lines/${lineId}`, { method:'DELETE' });
    loadOrders();
  };
  const addLine = (product) => {
    if (lines.find(l => l.product_id === product.product_id)) return;
    const eurToUsd = rates?.USD || 1;
    const priceEur = priceMap[product.product_id] || 0;
    setLines(prev => [...prev, { product_id: product.product_id, product_name: product.product_name, qty: product.suggested_qty || 1, price: Math.round(priceEur * eurToUsd * 100) / 100 }]);
    setPSearch('');
  };
  const openContainerModal = (order) => {
    const lines = order.lines.map(l => ({
      ...l,
      container_qty: l.qty,  // default: all quantity
      price: l.price || priceMap[l.product_id] || 0,
    }));
    setContainerModal({ order, lines, containerRef: order.ref });
  };

  const sendContainer = async () => {
    if (!containerModal) return;
    const { order, lines, containerRef } = containerModal;
    setSendingOdoo(prev => new Set([...prev, order.id]));
    setOdooResult(null);
    setContainerModal(null);
    try {
      const payload = {
        container_ref: containerRef,
        lines: lines
          .filter(l => l.container_qty > 0)
          .map(l => ({ product_id: l.product_id, product_name: l.product_name, qty: l.container_qty, price: l.price })),
      };
      const r = await apiFetch(`/api/transit/${order.id}/send-to-odoo`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      const j = await r.json();
      if (!r.ok) throw new Error(j.detail || 'Error desconocido');
      setOdooResult({ po_name: j.po_name, error: null });
      loadOrders();
    } catch(e) {
      setOdooResult({ po_name: null, error: e.message });
    } finally {
      setSendingOdoo(prev => { const s = new Set(prev); s.delete(order.id); return s; });
    }
  };

  const saveOrder = async () => {
    if (!form.ref || lines.length === 0) return;
    if (editingOrder) {
      await apiFetch(`/api/transit/${editingOrder.id}`, {
        method:'PATCH',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ...form, lines }),
      });
    } else {
      // Save current EUR→USD rate at creation time for historical reference
      const creationRate = rates?.USD || null;
      await apiFetch('/api/transit', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ ...form, lines, exchange_rate_at_creation: creationRate }),
      });
    }
    resetForm();
    loadOrders();
  };

  // Unique vendors from forecast products for the supplier dropdown
  const vendorOptions = useMemo(() => {
    const vs = new Set(allProducts.map(p => p.vendor).filter(Boolean));
    return [...vs].sort();
  }, [allProducts]);

  const filteredProducts = useMemo(() => {
    if (!pSearch || pSearch.length < 2) return [];
    const byVendor = form.supplier
      ? allProducts.filter(p => p.vendor === form.supplier)
      : allProducts;
    const q = pSearch.toLowerCase();
    return byVendor.filter(p =>
      p.product_name.toLowerCase().includes(q) || (p.old_sku||'').toLowerCase().includes(q)
    ).slice(0, 12);
  }, [allProducts, pSearch, form.supplier]);

  const totalUnits = orders.reduce((a, o) => a + o.lines.reduce((b, l) => b + l.qty, 0), 0);
  const totalLines = orders.reduce((a, o) => a + o.lines.length, 0);

  const resetForm = () => {
    setShowForm(false);
    setEditingOrder(null);
    setLines([]);
    setImportPreview(null);
    setForm({ ref:'', supplier:'', order_date: new Date().toISOString().slice(0,10), expected_arrival:'' });
    setPSearch('');
  };

  const startEdit = (order) => {
    setEditingOrder(order);
    setForm({
      ref:              order.ref || '',
      supplier:         order.supplier || '',
      order_date:       order.order_date || '',
      expected_arrival: order.expected_arrival || '',
    });
    setLines(order.lines.map(l => ({ ...l })));
    setImportPreview(null);
    setShowForm(true);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  // ── Excel export ────────────────────────────────────────────────────────────
  const exportTransitExcel = async () => {
    const XLSX = window.XLSX;
    if (!XLSX) return alert('SheetJS no cargado');

    // Collect all unique product IDs across all orders
    const allPids = [...new Set(orders.flatMap(o => o.lines.map(l => l.product_id).filter(Boolean)))];
    let details = {};
    if (allPids.length > 0) {
      try {
        const r = await apiFetch(`/api/products/transit-details?ids=${allPids.join(',')}`);
        details = await r.json();
      } catch(e) { /* silently skip if error */ }
    }

    const rows = [['Referencia', 'Proveedor', 'Fecha Pedido', 'Llegada Estimada', 'Producto', 'Old SKU', 'Ref. Proveedor', 'Uds Originales', 'Uds Pendientes']];
    orders.forEach(o => {
      o.lines.forEach((l, i) => {
        const d = details[l.product_id] || {};
        rows.push([
          i === 0 ? o.ref : '',
          i === 0 ? (o.supplier || '') : '',
          i === 0 ? (o.order_date || '') : '',
          i === 0 ? (o.expected_arrival || '') : '',
          l.product_name,
          d.old_sku || '',
          d.vendor_ref || '',
          l.original_qty || l.qty,
          l.qty,
        ]);
      });
      rows.push(['', '', '', '', '', '', '', '', '']);
    });
    const ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [20,20,14,16,50,14,16,14,14].map(w => ({ wch: w }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'En tránsito');
    XLSX.writeFile(wb, `transito_${new Date().toISOString().slice(0,10)}.xlsx`);
  };

  // ── Excel import ────────────────────────────────────────────────────────────
  const [transitSearch, setTransitSearch] = useState('');
  const [importPreview, setImportPreview] = useState(null); // array of parsed orders
  const [importSaving,  setImportSaving]  = useState(false);

  const importExcel = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const XLSX = window.XLSX;
        const wb   = XLSX.read(ev.target.result, { type:'array' });
        const ws   = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, defval:'' });
        // Format: [Referencia, Proveedor, Fecha Pedido, Llegada Estimada, Producto, Old SKU, Ref. Proveedor, Uds Originales, Uds Pendientes]
        // Col 0 only filled on first row of each order; empty rows separate orders
        const parsed = [];
        let cur = null;
        rows.slice(1).forEach(r => {
          const ref         = String(r[0] || '').trim();
          const supplier    = String(r[1] || '').trim();
          const orderDate   = String(r[2] || '').trim();
          const arrival     = String(r[3] || '').trim();
          const productName = String(r[4] || '').trim();
          const oldSku      = String(r[5] || '').trim();
          const qty         = parseFloat(String(r[7] || '0').replace(',','.')) || 0;
          if (!productName) return; // empty separator row
          if (ref) { // new order block
            cur = { ref, supplier, order_date: orderDate, expected_arrival: arrival, lines: [] };
            parsed.push(cur);
          }
          if (!cur || qty <= 0) return;
          const found = allProducts.find(p =>
            p.product_name === productName ||
            (oldSku && p.old_sku && p.old_sku.toLowerCase() === oldSku.toLowerCase())
          );
          cur.lines.push({
            product_id:   found?.product_id || null,
            product_name: productName,
            qty,
            price:        found ? (found.vendor_price || found.avg_price || 0) : 0,
            matched:      !!found,
          });
        });
        const valid = parsed.filter(o => o.lines.length > 0);
        if (valid.length === 0) return alert('No se encontraron pedidos con productos en el Excel.\nVerifica que el formato es el del Excel exportado desde esta misma web.');
        setImportPreview(valid);
      } catch(err) {
        alert('Error leyendo el Excel: ' + err.message);
      }
    };
    reader.readAsArrayBuffer(file);
    e.target.value = '';
  };

  const confirmImport = async () => {
    if (!importPreview?.length) return;
    setImportSaving(true);
    try {
      for (const order of importPreview) {
        const linesToSave = order.lines.filter(l => l.product_id && l.qty > 0);
        if (linesToSave.length === 0) continue;
        const res = await apiFetch('/api/transit', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ref: order.ref, supplier: order.supplier, order_date: order.order_date, expected_arrival: order.expected_arrival, lines: linesToSave }),
        });
        if (!res.ok) { alert(`Error creando "${order.ref}": ${await res.text()}`); break; }
      }
      setImportPreview(null);
      loadOrders();
    } catch(e) { alert('Error de red: ' + e.message); }
    setImportSaving(false);
  };

  /* ── Import preview modal ─────────────────────────────────────────── */
  if (importPreview) {
    const totalOrders   = importPreview.length;
    const totalProducts = importPreview.reduce((a,o) => a + o.lines.filter(l=>l.matched).length, 0);
    const totalUnmatched= importPreview.reduce((a,o) => a + o.lines.filter(l=>!l.matched).length, 0);
    return (
      <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4">
        <div className="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-2xl max-h-[90vh] flex flex-col shadow-2xl">
          <div className="px-6 py-4 border-b border-gray-800 flex items-center justify-between shrink-0">
            <div>
              <h3 className="text-white font-bold">📥 Vista previa de importación</h3>
              <p className="text-xs text-gray-500 mt-0.5">
                {totalOrders} pedido{totalOrders!==1?'s':''} · {totalProducts} producto{totalProducts!==1?'s':''} identificado{totalProducts!==1?'s':''}
                {totalUnmatched > 0 && <span className="text-amber-400 ml-2">· ⚠️ {totalUnmatched} sin identificar (se omitirán)</span>}
              </p>
            </div>
            <button onClick={() => setImportPreview(null)} className="text-gray-500 hover:text-white text-xl leading-none">×</button>
          </div>
          <div className="overflow-y-auto flex-1 px-6 py-4 space-y-4">
            {importPreview.map((order, oi) => (
              <div key={oi} className="bg-gray-800/50 border border-gray-700/50 rounded-xl p-3">
                <div className="flex items-center gap-3 mb-2">
                  <span className="text-sm font-semibold text-white">{order.ref}</span>
                  {order.supplier && <span className="text-xs text-gray-400">{order.supplier}</span>}
                  {order.order_date && <span className="text-xs text-gray-600">{order.order_date}</span>}
                  {order.expected_arrival && <span className="text-xs text-amber-500">🚢 {order.expected_arrival}</span>}
                </div>
                <table className="w-full text-xs">
                  <tbody>
                    {order.lines.map((line, li) => (
                      <tr key={li} className={`border-b border-gray-700/30 ${!line.matched ? 'opacity-40' : ''}`}>
                        <td className="py-1 pr-3 text-gray-300 truncate max-w-xs" title={line.product_name}>
                          {!line.matched && <span className="text-amber-500 mr-1" title="Producto no encontrado">⚠️</span>}
                          {line.product_name}
                        </td>
                        <td className="py-1 text-right text-emerald-300 font-semibold w-20">{num(line.qty,0)} uds</td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            ))}
          </div>
          <div className="px-6 py-4 border-t border-gray-800 flex gap-3 justify-end shrink-0">
            <button onClick={() => setImportPreview(null)} className="px-4 py-2 rounded-lg text-sm bg-gray-800 border border-gray-700 text-gray-300 hover:bg-gray-700">Cancelar</button>
            <button onClick={confirmImport} disabled={importSaving || totalProducts === 0}
              className="px-4 py-2 rounded-lg text-sm bg-emerald-600 hover:bg-emerald-500 disabled:opacity-40 text-white font-semibold">
              {importSaving ? '⏳ Importando...' : `✅ Importar ${totalOrders} pedido${totalOrders!==1?'s':''}`}
            </button>
          </div>
        </div>
      </div>
    );
  }

  /* ── Container modal ──────────────────────────────────────────────── */
  if (containerModal) {
    const { order: mo, lines: ml, containerRef: mcr } = containerModal;
    const totalValue = ml.reduce((a, l) => a + l.container_qty * (l.price || 0), 0);
    return (
      <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4">
        <div className="bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-2xl max-h-[90vh] flex flex-col shadow-2xl">
          <div className="px-6 py-4 border-b border-gray-800 flex items-center justify-between">
            <div>
              <h3 className="text-white font-bold text-base">📦 Nuevo contenedor → Odoo</h3>

                    </td>

            </div>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="fade space-y-4">
      {/* Odoo send result banner */}

      {/* Header */}
      <div className="flex items-center justify-between flex-wrap gap-3">
        <div>
          <h2 className="text-lg font-bold text-white">🚢 Pedidos en tránsito</h2>

            Pedidos ya realizados pero pendientes de entrar en Odoo
            {orders.length > 0 && (() => {
              const totalVal = orders.reduce((a,o) => a + o.lines.reduce((b,l) => b + l.qty*(l.price||(priceMap[l.product_id]||0)*(rates?.USD||1)), 0), 0);
              return ` · ${orders.length} pedido${orders.length>1?'s':''} · ${num(totalLines,0)} referencias · ${num(totalUnits,0)} uds · ${totalVal > 0 ? `USD ${Math.round(totalVal).toLocaleString('es-ES')}` : ''}`;
            })()}

        </div>
        <div className="flex items-center gap-2">
          {orders.length > 0 && (
            <button onClick={exportTransitExcel}
              className="px-4 py-2 rounded-lg text-sm bg-gray-700 hover:bg-gray-600 text-gray-200 font-semibold transition-colors flex items-center gap-1.5">

          {!readOnly && <>
            <label className={`px-4 py-2 rounded-lg text-sm bg-emerald-700 hover:bg-emerald-600 text-white font-semibold transition-colors cursor-pointer ${showForm ? 'opacity-40 pointer-events-none' : ''}`}

            <button onClick={() => { setImportPreview(null); setShowForm(true); }} disabled={showForm}
              className="px-4 py-2 rounded-lg text-sm bg-indigo-600 hover:bg-indigo-500 disabled:opacity-40 text-white font-semibold transition-colors">
              + Nuevo pedido
            </button>
          </>}
        </div>
      </div>

      {/* Search + supplier filter + payment filter */}
      {!showForm && orders.length > 0 && (
        <div className="flex items-center gap-3 flex-wrap">
          <input type="text" value={transitSearch} onChange={e => setTransitSearch(e.target.value)}
            placeholder="Buscar producto en pedidos en tránsito…"
            className="w-full max-w-sm px-3 py-1.5 rounded-lg text-sm bg-gray-800 border border-gray-700 text-gray-200 placeholder-gray-500 focus:outline-none focus:border-indigo-500" />
          {suppliers.length > 0 && (
            <select value={supplierFilter} onChange={e => setSupplierFilter(e.target.value)}
              className="px-3 py-1.5 rounded-lg text-sm bg-gray-800 border border-gray-700 text-gray-200 focus:outline-none focus:border-indigo-500 cursor-pointer">
              <option value="all">Todas las fábricas ({orders.length})</option>
              {suppliers.map(s => <option key={s} value={s}>{s} ({orders.filter(o=>o.supplier===s).length})</option>)}
            </select>
          )}
          {/* Payment status filter */}
          <div className="flex items-center gap-1">
            {[
              { key:'all',      label:'💳 Todos',         cls:'bg-gray-700 text-gray-200' },
              { key:'none',     label:'⬜ Sin pago',       cls:'bg-gray-800 border-gray-600 text-gray-400' },
              { key:'partial',  label:'🟡 Parcial',        cls:'bg-amber-900/40 border-amber-700/50 text-amber-400' },
              { key:'complete', label:'✅ Pagado',          cls:'bg-emerald-900/40 border-emerald-700/50 text-emerald-400' },
            ].map(f => (
              <button key={f.key} onClick={() => setPaymentFilter(f.key)}
                className={`px-2.5 py-1.5 rounded-lg text-xs border font-medium transition-colors ${
                  paymentFilter === f.key ? f.cls + ' ring-1 ring-indigo-500' : 'bg-gray-800/50 border-gray-700 text-gray-500 hover:text-gray-300'
                }`}>
                {f.label}
              </button>
            ))}
          </div>
          {/* Sort selector */}
          <div className="flex items-center gap-1.5 bg-gray-800/60 border border-gray-700/50 rounded-lg px-2 py-1">
            <span className="text-xs text-gray-500 shrink-0">Ordenar:</span>
            {[
              { key: 'arrival',    label: '📦 Llegada' },
              { key: 'order_date', label: '📅 Pedido' },
              { key: 'created',    label: '🕐 Creación' },

              <button key={opt.key} onClick={() => setTransitSort(opt.key)}
                className={`px-2 py-0.5 rounded text-xs transition-colors ${transitSort === opt.key ? 'bg-indigo-600 text-white' : 'text-gray-400 hover:text-gray-200'}`}>
                {opt.label}
              </button>
            ))}
          </div>
          {(transitSearch || supplierFilter !== 'all' || paymentFilter !== 'all' || transitSort !== 'arrival') && (
            <button onClick={() => { setTransitSearch(''); setSupplierFilter('all'); setPaymentFilter('all'); setTransitSort('arrival'); }}
              className="text-xs text-gray-500 hover:text-gray-300">✕ Limpiar filtros</button>
          )}
        </div>
      )}

      {/* Payment summary panel */}
      {!showForm && activeOrders.some(o => (o.payments||[]).length > 0) && (() => {
        const filteredForPayments = supplierFilter === 'all' ? activeOrders : activeOrders.filter(o => o.supplier === supplierFilter);
        const bySupplier = {};
        filteredForPayments.forEach(o => {
          const sup = o.supplier || 'Sin fábrica';
          const paid    = (o.payments||[]).reduce((a,p) => a+(parseFloat(p.amount)||0), 0);
          const orderVal = o.lines.reduce((a,l) => a+(parseFloat(l.qty)||0)*(l.price||(priceMap[l.product_id]||0)*(rates?.USD||1)), 0);
          if (!bySupplier[sup]) bySupplier[sup] = { paid:0, orderVal:0 };
          bySupplier[sup].paid     += paid;
          bySupplier[sup].orderVal += orderVal;
        });
        const totalPaid    = Object.values(bySupplier).reduce((a,v) => a+v.paid, 0);
        const totalOrderVal= Object.values(bySupplier).reduce((a,v) => a+v.orderVal, 0);
        const totalPending = Math.max(0, totalOrderVal - totalPaid);
        return (
          <div className="bg-gray-900 border border-amber-800/30 rounded-xl p-4">
